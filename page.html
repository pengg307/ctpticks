<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CTP 订单流实时监控 v2.0</title>
    <script src="/js/echarts.min.js" onerror="this.src='https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js'"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e1a;
            color: #e0e0e0;
            font-family: 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        .header {
            height: 44px;
            background: #1a1f2e;
            display: flex;
            align-items: center;
            padding: 0 12px;
            border-bottom: 1px solid #2a3040;
            flex-shrink: 0;
        }
        .header h1 {
            font-size: 15px;
            color: #00d4aa;
            margin-right: 10px;
            white-space: nowrap;
        }
        .header .status {
            font-size: 11px;
            color: #888;
            white-space: nowrap;
        }
        .header .status.connected { color: #00d4aa; }
        .header .btn-connect {
            margin-left: auto;
            padding: 5px 12px;
            background: #00d4aa;
            color: #000;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
        }
        .header .btn-connect:hover { background: #00b894; }
        .header .btn-connect:disabled { background: #666; cursor: not-allowed; }
        .header .btn-source {
            margin-left: 8px;
            padding: 5px 10px;
            background: #2a3040;
            color: #888;
            border: 1px solid #3a4050;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            white-space: nowrap;
        }
        .header .btn-source.mock { background: #00d4aa; color: #000; border-color: #00d4aa; }
        .header .btn-source.ctp { background: #e74c3c; color: #fff; border-color: #e74c3c; }
        .header .mode-btns {
            display: flex;
            gap: 6px;
            margin-left: 12px;
        }
        .header .mode-btn {
            padding: 4px 10px;
            background: #2a3040;
            border: 1px solid #3a4050;
            color: #888;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
        .header .mode-btn:hover,
        .header .mode-btn.active {
            background: #00d4aa;
            color: #000;
            border-color: #00d4aa;
        }

        .main-container {
            display: flex;
            height: calc(100vh - 44px);
            overflow: hidden;
        }
        .left-section {
            display: flex;
            flex: 1;
            min-width: 0;
        }
        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #1a1f2e;
            min-width: 0;
        }
        .chart-window {
            flex: 1;
            border-bottom: 1px solid #1a1f2e;
            position: relative;
            cursor: pointer;
            transition: box-shadow 0.2s;
            min-height: 0;
        }
        .chart-window:hover { box-shadow: inset 0 0 20px rgba(0,212,170,0.1); }
        .chart-window.active { box-shadow: inset 0 0 0 2px #00d4aa; }
        .chart-window .title-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 28px;
            background: rgba(26,31,46,0.95);
            display: flex;
            align-items: center;
            padding: 0 6px;
            z-index: 10;
            font-size: 11px;
        }
        .chart-window .title-bar .inst-select {
            background: #2a3040;
            border: 1px solid #3a4050;
            color: #fff;
            padding: 2px 4px;
            font-size: 10px;
            border-radius: 3px;
            cursor: pointer;
            max-width: 80px;
            margin-right: 4px;
        }
        .chart-window .title-bar .inst-select option {
            background: #1a1f2e;
            color: #fff;
        }
        .chart-window .title-bar .inst-name {
            color: #fff;
            font-weight: bold;
            margin-right: 6px;
            white-space: nowrap;
        }
        .chart-window .title-bar .price {
            color: #00d4aa;
            margin-right: 6px;
            font-family: monospace;
            font-size: 12px;
            transition: color 0.3s;
        }
        .chart-window .title-bar .price.down { color: #ff4757; }
        .chart-window .title-bar .price.up { color: #00ff88; }
        .chart-window .title-bar .period-selector {
            margin-left: auto;
            display: flex;
            gap: 2px;
        }
        .chart-window .title-bar .period-btn {
            background: #2a3040;
            border: 1px solid #3a4050;
            color: #888;
            padding: 2px 5px;
            font-size: 9px;
            cursor: pointer;
            border-radius: 3px;
            white-space: nowrap;
        }
        .chart-window .title-bar .period-btn:hover,
        .chart-window .title-bar .period-btn.active {
            background: #00d4aa;
            color: #000;
            border-color: #00d4aa;
        }
        .chart-container {
            width: 100%;
            height: 100%;
            padding-top: 28px;
        }
        .right-section {
            width: 380px;
            background: #0f1420;
            border-left: 2px solid #1a1f2e;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .right-header {
            height: 36px;
            background: #1a1f2e;
            display: flex;
            align-items: center;
            padding: 0 10px;
            border-bottom: 1px solid #2a3040;
            flex-shrink: 0;
        }
        .right-header .inst-title {
            font-size: 13px;
            color: #00d4aa;
            font-weight: bold;
        }
        .right-header .inst-code {
            font-size: 10px;
            color: #888;
            margin-left: 6px;
        }
        .indicator-dashboard {
            background: #121826;
            border-bottom: 1px solid #2a3040;
            padding: 8px 10px;
            flex-shrink: 0;
        }
        .indicator-dashboard .dash-title {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .indicator-dashboard .dash-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        .indicator-dashboard .dash-item {
            background: #1a1f2e;
            border-radius: 4px;
            padding: 5px 8px;
            border: 1px solid #2a3040;
        }
        .indicator-dashboard .dash-item .dash-label {
            font-size: 9px;
            color: #666;
            margin-bottom: 2px;
        }
        .indicator-dashboard .dash-item .dash-value {
            font-size: 13px;
            font-weight: bold;
            font-family: 'SF Mono', 'Consolas', monospace;
        }
        .indicator-dashboard .dash-item .dash-value.buy { color: #00d4aa; }
        .indicator-dashboard .dash-item .dash-value.sell { color: #ff4757; }
        .indicator-dashboard .dash-item .dash-value.neutral { color: #888; }
        .indicator-dashboard .dash-item .dash-value.spike {
            color: #ff4757;
            animation: pulseRed 1s infinite;
        }
        @keyframes pulseRed {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .key-levels-table {
            margin-top: 6px;
            border-top: 1px solid #2a3040;
            padding-top: 6px;
        }
        .key-levels-table .kl-row {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            padding: 1px 0;
        }
        .key-levels-table .kl-row .kl-label { color: #666; }
        .key-levels-table .kl-row .kl-value { font-family: monospace; }
        .key-levels-table .kl-row .kl-value.res { color: #ff6b6b; }
        .key-levels-table .kl-row .kl-value.sup { color: #00d4aa; }
        .key-levels-table .kl-row .kl-value.pivot { color: #f1c40f; }
        .orderflow-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px;
            -webkit-overflow-scrolling: touch;
        }
        .orderflow-item {
            display: flex;
            align-items: center;
            padding: 2px 5px;
            margin-bottom: 1px;
            border-radius: 3px;
            font-size: 11px;
            font-family: 'SF Mono', 'Consolas', monospace;
        }
        .orderflow-item.buy { background: rgba(0,212,170,0.08); }
        .orderflow-item.sell { background: rgba(255,71,87,0.08); }
        .orderflow-item.mix { background: rgba(136,136,136,0.05); }
        .orderflow-item .time { width: 55px; color: #666; font-size: 10px; }
        .orderflow-item .price { width: 65px; text-align: right; }
        .orderflow-item .delta { width: 45px; text-align: right; font-weight: bold; font-size: 10px; }
        .stats-bar {
            height: 56px;
            background: #1a1f2e;
            border-top: 1px solid #2a3040;
            padding: 6px 10px;
            font-size: 11px;
            flex-shrink: 0;
        }
        .stats-bar .row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 3px;
        }
        .stats-bar .label { color: #888; }
        .stats-bar .value { color: #fff; font-weight: bold; }
        .stats-bar .value.buy { color: #00d4aa; }
        .stats-bar .value.sell { color: #ff4757; }
        .debug-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1a1f2e;
            border-top: 1px solid #2a3040;
            padding: 6px 12px;
            font-size: 10px;
            color: #888;
            max-height: 100px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }
        .debug-panel.visible { display: block; }
        .debug-panel .log-entry { margin-bottom: 2px; }
        .debug-panel .log-time { color: #666; }
        .debug-panel .log-info { color: #00d4ff; }
        .debug-panel .log-error { color: #e94560; }
        .debug-panel .log-success { color: #00ff88; }
        .debug-panel .log-warn { color: #f1c40f; }

        .mobile-toggle {
            display: none;
            position: fixed;
            bottom: 110px;
            right: 10px;
            width: 40px;
            height: 40px;
            background: #00d4aa;
            color: #000;
            border: none;
            border-radius: 50%;
            font-size: 18px;
            z-index: 50;
            cursor: pointer;
            align-items: center;
            justify-content: center;
        }

        @keyframes flashNew {
            0% { background-color: rgba(0,212,170,0.4); }
            100% { background-color: transparent; }
        }
        .orderflow-item.flash-new {
            animation: flashNew 0.6s ease-out;
        }

        @keyframes priceFlashUp {
            0% { color: #00ff88; text-shadow: 0 0 8px rgba(0,255,136,0.5); }
            100% { color: #00d4aa; text-shadow: none; }
        }
        @keyframes priceFlashDown {
            0% { color: #ff4757; text-shadow: 0 0 8px rgba(255,71,87,0.5); }
            100% { color: #ff4757; text-shadow: none; }
        }
        .price.flash-up { animation: priceFlashUp 0.5s ease-out; }
        .price.flash-down { animation: priceFlashDown 0.5s ease-out; }

        /* 手机响应式 */
        @media (max-width: 768px) {
            body { overflow: auto; }
            .header { height: 40px; padding: 0 8px; }
            .header h1 { font-size: 13px; }
            .header .mode-btns { display: none; }
            .main-container {
                flex-direction: column;
                height: auto;
                min-height: calc(100vh - 40px);
            }
            .left-section {
                flex-direction: column;
                height: auto;
            }
            .column {
                flex-direction: row;
                flex-wrap: wrap;
                border-right: none;
                border-bottom: 1px solid #1a1f2e;
            }
            .chart-window {
                width: 100%;
                height: 280px;
                border-bottom: 1px solid #1a1f2e;
            }
            .right-section {
                width: 100%;
                height: 400px;
                border-left: none;
                border-top: 2px solid #1a1f2e;
            }
            .mobile-toggle { display: flex; }
        }

        @media (max-width: 480px) {
            .chart-window { height: 220px; }
            .chart-window .title-bar .period-selector { display: none; }
            .chart-window.active .title-bar .period-selector { display: flex; }
            .orderflow-item { font-size: 10px; padding: 2px 4px; }
            .orderflow-item .time { width: 50px; }
            .orderflow-item .price { width: 55px; }
            .orderflow-item .delta { width: 40px; }
            .orderflow-item .vol-bar-wrap { padding: 0 3px; min-width: 40px; }
        }

        .grid-drag-handle {
            position: absolute;
            left: 10%;
            right: 6%;
            height: 6px;
            z-index: 100;
            cursor: row-resize;
            background: transparent;
            transition: background 0.2s;
        }
        .grid-drag-handle:hover {
            background: rgba(0, 212, 170, 0.3);
        }
        .grid-drag-handle.dragging {
            background: rgba(0, 212, 170, 0.6);
        }

        /* OrderFlow 可视化成交量条 */
        .orderflow-item .vol-bar-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 0 6px;
            min-width: 60px;
        }
        .orderflow-item .vol-bar {
            flex: 1;
            height: 14px;
            background: rgba(136,136,136,0.08);
            border-radius: 2px;
            position: relative;
            overflow: hidden;
            display: flex;
        }
        .orderflow-item .vol-buy {
            height: 100%;
            background: #00d4aa;
            border-radius: 2px 0 0 2px;
            transition: width 0.2s;
        }
        .orderflow-item .vol-sell {
            height: 100%;
            background: #ff4757;
            border-radius: 0 2px 2px 0;
            transition: width 0.2s;
        }
        .orderflow-item .vol-text {
            position: absolute;
            left: 0; right: 0;
            text-align: center;
            font-size: 9px;
            color: #fff;
            line-height: 14px;
            text-shadow: 0 0 2px rgba(0,0,0,0.8);
            pointer-events: none;
        }
        .orderflow-item.buy .vol-bar { background: rgba(0,212,170,0.08); }
        .orderflow-item.sell .vol-bar { background: rgba(255,71,87,0.08); }

        /* 指标卡片 hover 效果 */
        .dash-item {
            transition: all 0.2s;
            position: relative;
        }
        .dash-item:hover {
            border-color: #00d4aa !important;
            background: #1a2a2a !important;
        }
        .key-levels-table {
            transition: all 0.2s;
        }
        .key-levels-table:hover {
            background: rgba(0,212,170,0.05);
        }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #0a0e1a; }
        ::-webkit-scrollbar-thumb { background: #2a3040; border-radius: 2px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>CTP订单流 v2.0</h1>
        <div class="mode-btns">
            <button class="mode-btn active" id="btnMode2" onclick="changeMode(2)">2窗口</button>
            <button class="mode-btn" id="btnMode4" onclick="changeMode(4)">4窗口</button>
            <button class="mode-btn" id="btnMode6" onclick="changeMode(6)">6窗口</button>
        </div>
        <span class="status" id="conn-status">未连接</span>
        <button class="btn-source mock" id="btnSource" title="点击切换Mock/CTP">Mock</button>
        <button class="btn-connect" id="btnConnect">连接</button>
    </div>
    <div class="main-container">
        <div class="left-section" id="left-section"></div>
        <div class="right-section">
            <div class="right-header">
                <span class="inst-title" id="right-title">--</span>
                <span class="inst-code" id="right-code">--</span>
            </div>

            <!-- 紧凑指标面板 -->
            <div class="indicator-dashboard compact" id="indicator-dashboard" style="padding:4px 8px; position:relative;">
                <!-- 悬浮提示层 -->
                <div id="ind-tooltip" style="display:none; position:absolute; top:0; left:0; right:0; background:rgba(10,14,26,0.98); border:1px solid #3a4050; border-radius:6px; padding:10px 12px; z-index:50; box-shadow:0 4px 20px rgba(0,0,0,0.6); font-size:11px; line-height:1.7; pointer-events:none;"></div>

                <div class="dash-grid" style="grid-template-columns:1fr 1fr 1fr 1fr 1fr 1fr;">
                    <div class="dash-item" style="padding:3px 5px; cursor:pointer;" data-tip="spread" onmouseenter="showIndTip(this)" onmouseleave="hideIndTip()">
                        <div class="dash-label" style="font-size:8px;">Spread</div>
                        <div class="dash-value neutral" id="dash-spread" style="font-size:11px;">--</div>
                    </div>
                    <div class="dash-item" style="padding:3px 5px; cursor:pointer;" data-tip="volz" onmouseenter="showIndTip(this)" onmouseleave="hideIndTip()">
                        <div class="dash-label" style="font-size:8px;">VolZ</div>
                        <div class="dash-value neutral" id="dash-vol-z" style="font-size:11px;">--</div>
                    </div>
                    <div class="dash-item" style="padding:3px 5px; cursor:pointer;" data-tip="cvd" onmouseenter="showIndTip(this)" onmouseleave="hideIndTip()">
                        <div class="dash-label" style="font-size:8px;">CVD</div>
                        <div class="dash-value neutral" id="dash-cvd" style="font-size:11px;">--</div>
                    </div>
                    <div class="dash-item" style="padding:3px 5px; cursor:pointer;" data-tip="noiz" onmouseenter="showIndTip(this)" onmouseleave="hideIndTip()">
                        <div class="dash-label" style="font-size:8px;">NOIZ</div>
                        <div class="dash-value neutral" id="dash-noi-z" style="font-size:11px;">--</div>
                    </div>
                    <div class="dash-item" style="padding:3px 5px; cursor:pointer;" data-tip="vwap" onmouseenter="showIndTip(this)" onmouseleave="hideIndTip()">
                        <div class="dash-label" style="font-size:8px;">VWAP</div>
                        <div class="dash-value neutral" id="dash-vwap" style="font-size:11px;">--</div>
                    </div>
                    <div class="dash-item" style="padding:3px 5px; cursor:pointer;" data-tip="signal" onmouseenter="showIndTip(this)" onmouseleave="hideIndTip()">
                        <div class="dash-label" style="font-size:8px;">Signal</div>
                        <div class="dash-value neutral" id="dash-signal-mini" style="font-size:11px;">--</div>
                    </div>
                </div>

                <!-- 关键价位一行 -->
                <div class="key-levels-table" id="key-levels-table" style="margin-top:4px;padding-top:4px;border-top:1px solid #2a3040; cursor:pointer;" data-tip="levels" onmouseenter="showIndTip(this)" onmouseleave="hideIndTip()">
                    <div class="kl-row" style="font-size:9px;">
                        <span class="kl-label">P</span><span class="kl-value pivot" id="kl-pivot">--</span>
                        <span class="kl-label" style="margin-left:6px;">R1</span><span class="kl-value res" id="kl-r1">--</span>
                        <span class="kl-label" style="margin-left:6px;">S1</span><span class="kl-value sup" id="kl-s1">--</span>
                        <span class="kl-label" style="margin-left:6px;">POC</span><span class="kl-value" id="dash-poc" style="color:#f1c40f;">--</span>
                        <span class="kl-label" style="margin-left:6px;">VAH/V</span><span class="kl-value" id="dash-vah-val" style="color:#888;font-family:monospace;">--</span>
                    </div>
                </div>

                <!-- 交易信号一行 -->
                <div class="signal-bar" id="signal-bar" style="margin-top:4px;padding:4px 6px;background:#121826;border-radius:3px;display:flex;justify-content:space-between;align-items:center;font-size:10px;">
                    <span style="color:#666;">信号:</span>
                    <span id="sig-signal" style="font-weight:bold;color:#888;">--</span>
                    <span style="color:#666;margin-left:8px;">置信:</span>
                    <span id="sig-confidence" style="font-weight:bold;color:#888;">--</span>
                    <span style="color:#666;margin-left:8px;">大单:</span>
                    <span id="dash-large-count" style="font-weight:bold;color:#888;">0</span>
                </div>
            </div>

            <!-- 订单流列表 - 主要区域 -->
            <div class="orderflow-list" id="orderflow-list">
                <div style="text-align:center; color:#666; padding-top:50px;">点击"连接"开始接收数据</div>
            </div>

            <div class="stats-bar" id="stats-bar">
                <div class="row" style="align-items:center;">
                    <span class="label">买/卖:</span>
                    <span style="flex:1; display:flex; align-items:center; gap:4px; margin:0 8px;">
                        <span style="flex:1; height:10px; background:rgba(0,212,170,0.15); border-radius:2px; position:relative; overflow:hidden;">
                            <span id="stat-buy-bar" style="position:absolute; left:0; top:0; bottom:0; width:50%; background:#00d4aa; border-radius:2px; transition:width 0.3s;"></span>
                        </span>
                        <span id="stat-buy" class="value buy" style="font-size:10px; min-width:35px; text-align:right;">0</span>
                        <span style="color:#444;">/</span>
                        <span id="stat-sell" class="value sell" style="font-size:10px; min-width:35px; text-align:right;">0</span>
                        <span style="flex:1; height:10px; background:rgba(255,71,87,0.15); border-radius:2px; position:relative; overflow:hidden;">
                            <span id="stat-sell-bar" style="position:absolute; right:0; top:0; bottom:0; width:50%; background:#ff4757; border-radius:2px; transition:width 0.3s;"></span>
                        </span>
                    </span>
                    <span class="label">净Δ:</span>
                    <span class="value" id="stat-delta" style="min-width:45px; text-align:right;">0</span>
                </div>
                <div class="row" style="margin-top:4px; border-top:1px solid #2a3040; padding-top:4px;">
                    <span class="label" id="of-stat-label">显示: 0条</span>
                    <span class="value" id="of-time-range" style="font-size:9px; color:#666;">--</span>
                    <span style="margin-left:auto; font-size:9px; color:#666;">
                        窗口: <span id="stats-window-size" style="color:#00d4aa; cursor:pointer;" onclick="cycleWindowSize()">150</span> ticks
                    </span>
                </div>
            </div>
        </div>
    </div>
    <div class="debug-panel" id="debugPanel">
        <div style="color:#666; margin-bottom:4px; display:flex; justify-content:space-between;">
            <span>调试日志</span>
            <span style="cursor:pointer; color:#888;" onclick="toggleDebug()">✕</span>
        </div>
        <div id="debugLogs"></div>
    </div>
    <button class="mobile-toggle" id="mobileToggle" onclick="toggleDebug()">📋</button>

<script>
// ==================== 后端注入的配置 ====================
const SERVER_CONFIG = $SERVER_CONFIG;
const ALL_INSTRUMENTS = SERVER_CONFIG.all_instruments || [];
const ALL_INSTRUMENT_NAMES = SERVER_CONFIG.instrument_names || {};
const PERIODS = SERVER_CONFIG.periods || ["1m", "5m", "15m", "1h"];
const DEFAULT_MODE = SERVER_CONFIG.default_mode || 2;
const DEFAULT_WINDOWS = SERVER_CONFIG.default_windows || [];

// ==================== 服务器配置 ====================
const SERVER_HOST = window.location.host || "localhost:8080";
const WS_HOST = (window.location.protocol === 'file:' || !window.location.host) 
    ? "localhost:8080" 
    : window.location.host;
const WS_URL = (window.location.protocol === 'https:' ? 'wss://' : 'ws://') + WS_HOST + "/ws";
const API_BASE = (window.location.protocol === 'file:' ? 'http:' : window.location.protocol) + '//' + WS_HOST;

// ==================== 状态变量 ====================
let windowMode = DEFAULT_MODE;
let windowInstruments = DEFAULT_WINDOWS.slice(0, windowMode);
let selectedWindow = 0;
let windowPeriods = {};
const charts = {};
let ws = null;
let isConnected = false;
let currentSource = 'mock';
let reconnectTimer = null;
let heartbeatTimer = null;
let isConnecting = false;
let lastPrices = {};
let ofUserScrolled = false;
let ofAutoReturnTimer = null;
let ofLastItemTime = "";

// [NEW] 缓存每个窗口的最新指标数据
let windowIndicators = {};

const DEFAULT_GRID_RATIOS = [0.35, 0.12, 0.12, 0.12, 0.12, 0.17];
let gridRatios = {};

// [NEW] Stats bar window size (configurable ticks)
let STATS_WINDOW_SIZE = 150;  // default 150 ticks
const STATS_WINDOW_SIZES = [50, 100, 150, 200, 300, 500, 1000];

// [NEW] Rolling buffer for orderflow stats
let orderflowStatsBuffer = {
    buyTotal: 0,
    sellTotal: 0,
    deltaTotal: 0,
    count: 0,
    items: [],  // stores {buyVol, sellVol, delta, time}
    firstTime: null,
    lastTime: null
};

// ==================== 工具函数 ====================
function debugLog(msg, type) {
    const logs = document.getElementById('debugLogs');
    const time = new Date().toLocaleTimeString('zh-CN', {hour12:false});
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = '<span class="log-time">[' + time + ']</span> <span class="log-' + (type||'info') + '">' + escapeHtml(msg) + '</span>';
    logs.insertBefore(entry, logs.firstChild);
    while (logs.children.length > 30) logs.removeChild(logs.lastChild);
    console.log('[' + type + '] ' + msg);
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function toggleDebug() {
    document.getElementById('debugPanel').classList.toggle('visible');
}

// [NEW] Cycle through window sizes
function cycleWindowSize() {
    const currentIdx = STATS_WINDOW_SIZES.indexOf(STATS_WINDOW_SIZE);
    const nextIdx = (currentIdx + 1) % STATS_WINDOW_SIZES.length;
    STATS_WINDOW_SIZE = STATS_WINDOW_SIZES[nextIdx];
    document.getElementById('stats-window-size').textContent = STATS_WINDOW_SIZE;
    debugLog('统计窗口大小切换为: ' + STATS_WINDOW_SIZE + ' ticks', 'info');
    // Reset buffer to recalculate with new size
    resetStatsBuffer();
    // Re-process existing orderflow items if any
    const list = document.getElementById('orderflow-list');
    if (list) {
        const items = list.querySelectorAll('.orderflow-item');
        if (items.length > 0) {
            // Rebuild stats from current displayed items
            rebuildStatsFromDOM();
        }
    }
}

function resetStatsBuffer() {
    orderflowStatsBuffer = {
        buyTotal: 0,
        sellTotal: 0,
        deltaTotal: 0,
        count: 0,
        items: [],
        firstTime: null,
        lastTime: null
    };
    updateStatsDisplay();
}

function rebuildStatsFromDOM() {
    const list = document.getElementById('orderflow-list');
    if (!list) return;
    const items = list.querySelectorAll('.orderflow-item');
    resetStatsBuffer();
    items.forEach(function(el) {
        const buyEl = el.querySelector('.vol-buy');
        const sellEl = el.querySelector('.vol-sell');
        const deltaEl = el.querySelector('.delta');
        const timeEl = el.querySelector('.time');
        if (!buyEl || !sellEl || !deltaEl) return;
        const buyPct = parseFloat(buyEl.style.width) || 0;
        const sellPct = parseFloat(sellEl.style.width) || 0;
        const totalV = parseInt(el.querySelector('.vol-text')?.textContent || 0);
        const buyV = Math.round(totalV * buyPct / 100);
        const sellV = Math.round(totalV * sellPct / 100);
        const deltaV = parseInt(deltaEl.textContent) || 0;
        const time = timeEl ? timeEl.textContent : null;
        addToStatsBuffer(buyV, sellV, deltaV, time);
    });
}

function addToStatsBuffer(buyV, sellV, deltaV, time) {
    // Add to buffer
    orderflowStatsBuffer.items.push({
        buyVol: buyV,
        sellVol: sellV,
        delta: deltaV,
        time: time || new Date().toLocaleTimeString('zh-CN', {hour12:false})
    });
    orderflowStatsBuffer.buyTotal += buyV;
    orderflowStatsBuffer.sellTotal += sellV;
    orderflowStatsBuffer.deltaTotal += deltaV;
    orderflowStatsBuffer.count++;

    // Trim to window size
    while (orderflowStatsBuffer.items.length > STATS_WINDOW_SIZE) {
        const removed = orderflowStatsBuffer.items.shift();
        orderflowStatsBuffer.buyTotal -= removed.buyVol;
        orderflowStatsBuffer.sellTotal -= removed.sellVol;
        orderflowStatsBuffer.deltaTotal -= removed.delta;
        orderflowStatsBuffer.count--;
    }

    // Update time range
    if (orderflowStatsBuffer.items.length > 0) {
        orderflowStatsBuffer.firstTime = orderflowStatsBuffer.items[0].time;
        orderflowStatsBuffer.lastTime = orderflowStatsBuffer.items[orderflowStatsBuffer.items.length - 1].time;
    }

    updateStatsDisplay();
}

function updateStatsDisplay() {
    const buyTotal = orderflowStatsBuffer.buyTotal;
    const sellTotal = orderflowStatsBuffer.sellTotal;
    const deltaTotal = orderflowStatsBuffer.deltaTotal;

    document.getElementById('stat-buy').textContent = buyTotal;
    document.getElementById('stat-sell').textContent = sellTotal;
    const totalVol = buyTotal + sellTotal;
    const buyPct = totalVol > 0 ? (buyTotal / totalVol * 100).toFixed(1) : 50;
    const sellPct = totalVol > 0 ? (sellTotal / totalVol * 100).toFixed(1) : 50;
    const buyBar = document.getElementById('stat-buy-bar');
    const sellBar = document.getElementById('stat-sell-bar');
    if (buyBar) buyBar.style.width = buyPct + '%';
    if (sellBar) sellBar.style.width = sellPct + '%';
    const deltaEl = document.getElementById('stat-delta');
    deltaEl.textContent = (deltaTotal >= 0 ? '+' : '') + deltaTotal;
    deltaEl.style.color = deltaTotal >= 0 ? '#00d4aa' : '#ff4757';

    const ofStatLabel = document.getElementById('of-stat-label');
    const ofTimeRange = document.getElementById('of-time-range');
    if (ofStatLabel) {
        ofStatLabel.textContent = '显示: ' + orderflowStatsBuffer.count + '条 (窗口' + STATS_WINDOW_SIZE + 'ticks)';
    }
    if (ofTimeRange && orderflowStatsBuffer.firstTime && orderflowStatsBuffer.lastTime) {
        ofTimeRange.textContent = orderflowStatsBuffer.firstTime + ' ~ ' + orderflowStatsBuffer.lastTime;
    }
}

// ==================== 窗口模式切换 ====================
function changeMode(mode) {
    if (mode === windowMode) return;
    windowMode = mode;
    document.getElementById('btnMode2').classList.toggle('active', mode === 2);
    document.getElementById('btnMode4').classList.toggle('active', mode === 4);
    document.getElementById('btnMode6').classList.toggle('active', mode === 6);
    if (ws && isConnected) {
        ws.send(JSON.stringify({action: 'change_mode', mode: mode}));
    }
    initLayout();
    setTimeout(function() {
        for (var i = 0; i < windowMode; i++) {
            var inst = windowInstruments[i] || DEFAULT_WINDOWS[i] || ALL_INSTRUMENTS[0];
            windowInstruments[i] = inst;
            initChart(i, inst);
        }
    }, 300);
    debugLog('切换为 ' + mode + ' 窗口模式', 'info');
}

function changeWindowInstrument(windowIdx, inst) {
    windowInstruments[windowIdx] = inst;
    if (ws && isConnected) {
        ws.send(JSON.stringify({action: 'change_instrument', window_idx: windowIdx, instrument: inst}));
    }
    var period = windowPeriods[windowIdx] || '1m';
    fetchKlineData(inst, period, windowIdx);
    debugLog('窗口 ' + windowIdx + ' -> ' + inst, 'info');
}

// ==================== 布局初始化 ====================
function initLayout() {
    debugLog("初始化布局...", "info");
    const leftSection = document.getElementById('left-section');
    leftSection.innerHTML = '';

    var colCount = 2;
    var rowCount = windowMode / colCount;

    var col1 = document.createElement('div');
    col1.className = 'column';
    var col2 = document.createElement('div');
    col2.className = 'column';

    for (var i = 0; i < windowMode; i++) {
        var col = i < rowCount ? col1 : col2;
        var inst = windowInstruments[i] || DEFAULT_WINDOWS[i] || ALL_INSTRUMENTS[0];
        windowInstruments[i] = inst;
        if (!windowPeriods[i]) windowPeriods[i] = PERIODS[0] || '1m';

        var win = document.createElement('div');
        win.className = 'chart-window' + (i === 0 ? ' active' : '');
        win.id = 'window-' + i;
        win.dataset.index = i;
        win.dataset.inst = inst;

        var selectOptions = '';
        ALL_INSTRUMENTS.forEach(function(code) {
            var selected = code === inst ? ' selected' : '';
            var name = ALL_INSTRUMENT_NAMES[code] || code;
            selectOptions += '<option value="' + code + '"' + selected + '>' + name + '</option>';
        });

        var periodButtons = '';
        PERIODS.forEach(function(p) {
            var activeClass = p === windowPeriods[i] ? 'active' : '';
            periodButtons += '<button class="period-btn ' + activeClass + '" data-period="' + p + '">' + p + '</button>';
        });

        win.innerHTML = '<div class="title-bar">' +
            '<select class="inst-select" data-idx="' + i + '">' + selectOptions + '</select>' +
            '<span class="price" id="price-' + i + '">--</span>' +
            '<div class="period-selector">' + periodButtons + '</div>' +
            '</div>' +
            '<div class="chart-container" id="chart-' + i + '"></div>';

        col.appendChild(win);
    }

    leftSection.appendChild(col1);
    leftSection.appendChild(col2);

    for (var i = 0; i < windowMode; i++) {
        (function(idx) {
            var win = document.getElementById('window-' + idx);
            if (!win) return;
            win.addEventListener('click', function(e) {
                if (e.target.tagName === 'SELECT' || e.target.tagName === 'OPTION' || e.target.classList.contains('period-btn') || e.target.classList.contains('grid-drag-handle')) return;
                selectWindow(idx);
            });
            var select = win.querySelector('.inst-select');
            if (select) {
                select.addEventListener('change', function(e) {
                    changeWindowInstrument(idx, e.target.value);
                });
            }
            win.querySelectorAll('.period-btn').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    changePeriod(idx, btn.dataset.period);
                });
            });
        })(i);
    }

    setTimeout(function() {
        for (var i = 0; i < windowMode; i++) {
            initChart(i, windowInstruments[i]);
        }
    }, 200);
}

function initChart(windowIdx, inst) {
    var container = document.getElementById('chart-' + windowIdx);
    if (!container) return;
    if (charts[windowIdx]) {
        charts[windowIdx].dispose();
        delete charts[windowIdx];
    }
    try {
        var chart = echarts.init(container, 'dark');
        charts[windowIdx] = chart;
        fetchKlineData(inst, windowPeriods[windowIdx] || '1m', windowIdx);
        window.addEventListener('resize', function() { chart.resize(); });
        setTimeout(function() { createGridDragHandles(windowIdx); }, 500);
    } catch (e) {
        debugLog("图表初始化失败 " + windowIdx + ": " + e.message, "error");
    }
}

function createGridDragHandles(windowIdx) {
    var container = document.getElementById('chart-' + windowIdx);
    if (!container) return;
    var oldHandles = container.querySelectorAll('.grid-drag-handle');
    oldHandles.forEach(function(h) { h.remove(); });
    for (var i = 0; i < 5; i++) {
        var handle = document.createElement('div');
        handle.className = 'grid-drag-handle';
        handle.dataset.handleIndex = i;
        handle.dataset.windowIdx = windowIdx;
        handle.style.left = '10%';
        handle.style.right = '6%';
        handle.style.top = '0%';
        container.appendChild(handle);
        handle.addEventListener('mousedown', onDragHandleMouseDown);
    }
    updateDragHandlePositions(windowIdx);
}

function updateDragHandlePositions(windowIdx) {
    var container = document.getElementById('chart-' + windowIdx);
    if (!container) return;
    var chart = charts[windowIdx];
    if (!chart) return;
    var option = chart.getOption();
    if (!option || !option.grid) return;
    var handles = container.querySelectorAll('.grid-drag-handle');
    handles.forEach(function(handle, i) {
        var grid = option.grid[i];
        if (!grid) return;
        var top = parseFloat(grid.top) || 0;
        var height = parseFloat(grid.height) || 0;
        var bottom = top + height;
        handle.style.top = bottom + '%';
    });
}

var dragState = null;
function onDragHandleMouseDown(e) {
    e.preventDefault();
    e.stopPropagation();
    var handle = e.currentTarget;
    var windowIdx = parseInt(handle.dataset.windowIdx);
    var handleIdx = parseInt(handle.dataset.handleIndex);
    var container = document.getElementById('chart-' + windowIdx);
    dragState = {
        windowIdx: windowIdx,
        handleIdx: handleIdx,
        startY: e.clientY,
        containerHeight: container.clientHeight,
        startRatios: (gridRatios[windowIdx + '_' + (windowPeriods[windowIdx] || '1m')] || DEFAULT_GRID_RATIOS.slice()).slice()
    };
    handle.classList.add('dragging');
    document.addEventListener('mousemove', onDragHandleMouseMove);
    document.addEventListener('mouseup', onDragHandleMouseUp);
}

function onDragHandleMouseMove(e) {
    if (!dragState) return;
    var deltaY = e.clientY - dragState.startY;
    var deltaRatio = deltaY / dragState.containerHeight;
    var ratios = dragState.startRatios.slice();
    var idx = dragState.handleIdx;
    ratios[idx] += deltaRatio;
    ratios[idx + 1] -= deltaRatio;
    var minRatio = 0.05;
    if (ratios[idx] < minRatio) {
        ratios[idx + 1] += ratios[idx] - minRatio;
        ratios[idx] = minRatio;
    }
    if (ratios[idx + 1] < minRatio) {
        ratios[idx] += ratios[idx + 1] - minRatio;
        ratios[idx + 1] = minRatio;
    }
    var key = dragState.windowIdx + '_' + (windowPeriods[dragState.windowIdx] || '1m');
    gridRatios[key] = ratios;
    var chart = charts[dragState.windowIdx];
    if (chart) {
        chart.setOption({ grid: getChartGrids(dragState.windowIdx) });
        updateDragHandlePositions(dragState.windowIdx);
    }
}

function onDragHandleMouseUp(e) {
    if (!dragState) return;
    var container = document.getElementById('chart-' + dragState.windowIdx);
    if (container) {
        var handles = container.querySelectorAll('.grid-drag-handle');
        handles.forEach(function(h) { h.classList.remove('dragging'); });
    }
    dragState = null;
    document.removeEventListener('mousemove', onDragHandleMouseMove);
    document.removeEventListener('mouseup', onDragHandleMouseUp);
}


function updateChart(windowIdx, inst, period, data) {
    var chart = charts[windowIdx];
    if (!chart) return;

    var klines = data.klines || [];
    var macd = data.macd || {dif: [], dea: [], macd: []};
    var indicators = data.indicators || {};

    var dates = [];
    var candleData = [];
    var buyVolData = [];
    var sellVolData = [];
    var vwapData = [];
    var volZData = [];
    var cvdData = [];
    var cvdSlopeData = [];
    var noiData = [];
    var noiZData = [];
    var difData = [];
    var deaData = [];
    var macdData = [];
    var spreadData = [];

    for (var i = 0; i < klines.length; i++) {
        var bar = klines[i];
        dates.push(bar.time);
        candleData.push([bar.open, bar.close, bar.low, bar.high]);
        buyVolData.push({value: bar.buy_vol || 0, itemStyle: {color: '#00d4aa'}});
        sellVolData.push({value: bar.sell_vol || 0, itemStyle: {color: '#ff4757'}});
    }

    var vwap = indicators.vwap || [];
    var volZ = indicators.volume_zscore || [];
    var cvd = indicators.cvd || [];
    var cvdSlope = indicators.cvd_slope || [];
    var noi = indicators.noi || [];
    var noiZ = indicators.noi_zscore || [];
    var spread = indicators.current_spread || 0;
    var spreadHist = [];

    for (var i = 0; i < klines.length; i++) {
        vwapData.push(i < vwap.length ? vwap[i] : null);
        volZData.push(i < volZ.length ? volZ[i] : null);
        cvdData.push(i < cvd.length ? cvd[i] : null);
        cvdSlopeData.push(i < cvdSlope.length ? cvdSlope[i] : null);
        noiData.push(i < noi.length ? noi[i] : null);
        noiZData.push(i < noiZ.length ? noiZ[i] : null);
        spreadData.push({value: 0, itemStyle: {color: '#666'}});
    }

    var dif = macd.dif || [];
    var dea = macd.dea || [];
    var macdHist = macd.macd || [];

    for (var i = 0; i < klines.length; i++) {
        difData.push(i < dif.length ? dif[i] : null);
        deaData.push(i < dea.length ? dea[i] : null);
        if (i < macdHist.length && macdHist[i] !== null && macdHist[i] !== undefined) {
            macdData.push({
                value: macdHist[i],
                itemStyle: {color: macdHist[i] >= 0 ? '#00d4aa' : '#ff4757'}
            });
        } else {
            macdData.push(null);
        }
    }

    chart.__klines = klines.slice();

    var option = {
        backgroundColor: 'transparent',
        animation: false,
        tooltip: {
            trigger: 'axis',
            axisPointer: {type: 'cross'},
            backgroundColor: 'rgba(10,14,26,0.95)',
            borderColor: '#2a3040',
            textStyle: {color: '#e0e0e0', fontSize: 10},
            formatter: function(params) {
                if (!params || params.length === 0) return '';
                var idx = params[0].dataIndex;
                var bar = klines[idx];
                if (!bar) return '';
                var html = '<div style="font-size:11px;font-weight:bold;margin-bottom:4px;">' + bar.time + ' ' + inst + '</div>';
                html += '<div>O: ' + bar.open + ' C: ' + bar.close + ' H: ' + bar.high + ' L: ' + bar.low + '</div>';
                html += '<div>Vol: ' + bar.volume + ' Δ: ' + (bar.delta >= 0 ? '+' : '') + bar.delta + '</div>';
                if (bar.vwap) html += '<div>VWAP: ' + bar.vwap.toFixed(2) + '</div>';
                if (bar.cvd !== undefined) html += '<div>CVD: ' + bar.cvd + '</div>';
                if (bar.noi !== undefined) html += '<div>NOI: ' + bar.noi + '</div>';
                return html;
            }
        },
        axisPointer: {
            link: [{xAxisIndex: 'all'}],
            label: {backgroundColor: '#1a1f2e'}
        },
        grid: getChartGrids(windowIdx),
        xAxis: [
            {type: 'category', data: dates, gridIndex: 0, axisLine: {lineStyle: {color: '#2a3040'}}, axisLabel: {color: '#666', fontSize: 9}, splitLine: {show: false}},
            {type: 'category', data: dates, gridIndex: 1, axisLine: {lineStyle: {color: '#2a3040'}}, axisLabel: {show: false}, splitLine: {show: false}},
            {type: 'category', data: dates, gridIndex: 2, axisLine: {lineStyle: {color: '#2a3040'}}, axisLabel: {show: false}, splitLine: {show: false}},
            {type: 'category', data: dates, gridIndex: 3, axisLine: {lineStyle: {color: '#2a3040'}}, axisLabel: {show: false}, splitLine: {show: false}},
            {type: 'category', data: dates, gridIndex: 4, axisLine: {lineStyle: {color: '#2a3040'}}, axisLabel: {show: false}, splitLine: {show: false}},
            {type: 'category', data: dates, gridIndex: 5, axisLine: {lineStyle: {color: '#2a3040'}}, axisLabel: {color: '#666', fontSize: 9}, splitLine: {show: false}}
        ],
        yAxis: [
            {scale: true, gridIndex: 0, axisLine: {lineStyle: {color: '#2a3040'}}, axisLabel: {color: '#888', fontSize: 9}, splitLine: {lineStyle: {color: '#1a1f2e'}}},
            {scale: true, gridIndex: 1, axisLine: {lineStyle: {color: '#2a3040'}}, axisLabel: {show: false}, splitLine: {show: false}},
            {scale: true, gridIndex: 2, axisLine: {lineStyle: {color: '#2a3040'}}, axisLabel: {show: false}, splitLine: {show: false}},
            {scale: true, gridIndex: 3, axisLine: {lineStyle: {color: '#2a3040'}}, axisLabel: {show: false}, splitLine: {show: false}},
            {scale: true, gridIndex: 4, axisLine: {lineStyle: {color: '#2a3040'}}, axisLabel: {show: false}, splitLine: {show: false}},
            {scale: true, gridIndex: 5, axisLine: {lineStyle: {color: '#2a3040'}}, axisLabel: {show: false}, splitLine: {show: false}}
        ],
        dataZoom: [{
            type: 'inside',
            xAxisIndex: [0, 1, 2, 3, 4, 5],
            start: 0,
            end: 100
        }],
        series: [
            {
                name: 'K线',
                type: 'candlestick',
                xAxisIndex: 0,
                yAxisIndex: 0,
                data: candleData,
                itemStyle: {
                    color: '#00d4aa',
                    color0: '#ff4757',
                    borderColor: '#00d4aa',
                    borderColor0: '#ff4757'
                }
            },
            {
                name: 'VWAP',
                type: 'line',
                xAxisIndex: 0,
                yAxisIndex: 0,
                data: vwapData,
                smooth: true,
                symbol: 'none',
                lineStyle: {color: '#f1c40f', width: 1}
            },
            {
                name: '主动买',
                type: 'bar',
                xAxisIndex: 1,
                yAxisIndex: 1,
                data: buyVolData,
                barWidth: '80%',
                barGap: '-100%',
                z: 2
            },
            {
                name: '主动卖',
                type: 'bar',
                xAxisIndex: 1,
                yAxisIndex: 1,
                data: sellVolData,
                barWidth: '80%',
                barGap: '-100%',
                z: 1
            },
            {
                name: 'VolZ',
                type: 'line',
                xAxisIndex: 2,
                yAxisIndex: 2,
                data: volZData,
                smooth: true,
                symbol: 'none',
                lineStyle: {color: '#9b59b6', width: 1},
                markLine: {
                    silent: true,
                    data: [
                        {yAxis: 2, lineStyle: {color: '#00d4aa', type: 'dashed', width: 0.5}},
                        {yAxis: -2, lineStyle: {color: '#ff4757', type: 'dashed', width: 0.5}}
                    ]
                }
            },
            {
                name: 'CVD',
                type: 'line',
                xAxisIndex: 3,
                yAxisIndex: 3,
                data: cvdData,
                smooth: true,
                symbol: 'none',
                lineStyle: {color: '#3498db', width: 1},
                areaStyle: {
                    color: {
                        type: 'linear',
                        x: 0, y: 0, x2: 0, y2: 1,
                        colorStops: [
                            {offset: 0, color: 'rgba(52,152,219,0.3)'},
                            {offset: 1, color: 'rgba(52,152,219,0.05)'}
                        ]
                    }
                }
            },
            {
                name: 'CVD斜率',
                type: 'line',
                xAxisIndex: 3,
                yAxisIndex: 3,
                data: cvdSlopeData,
                smooth: true,
                symbol: 'none',
                lineStyle: {color: '#e67e22', width: 1}
            },
            {
                name: 'NOI',
                type: 'line',
                xAxisIndex: 4,
                yAxisIndex: 4,
                data: noiData,
                smooth: true,
                symbol: 'none',
                lineStyle: {color: '#1abc9c', width: 1}
            },
            {
                name: 'NOIZ',

function getChartGrids(windowIdx) {
    var key = windowIdx + '_' + (windowPeriods[windowIdx] || '1m');
    var ratios = gridRatios[key] || DEFAULT_GRID_RATIOS.slice();
    var grids = [];
    var top = 5;
    for (var i = 0; i < ratios.length; i++) {
        var h = ratios[i] * 90;
        grids.push({
            left: '10%',
            right: '6%',
            top: top + '%',
            height: h + '%',
            containLabel: false
        });
        top += h + 1;
    }
    return grids;
}

function changePeriod(windowIdx, period) {
    if (windowPeriods[windowIdx] === period) return;
    windowPeriods[windowIdx] = period;

    // Update button active states
    var win = document.getElementById('window-' + windowIdx);
    if (win) {
        win.querySelectorAll('.period-btn').forEach(function(btn) {
            btn.classList.toggle('active', btn.dataset.period === period);
        });
    }

    var inst = windowInstruments[windowIdx];
    if (inst) {
        fetchKlineData(inst, period, windowIdx);
        debugLog('窗口 ' + windowIdx + ' 周期 -> ' + period, 'info');
    }
}

function fetchKlineData(inst, period, windowIdx) {
    var url = API_BASE + '/api/klines?inst=' + encodeURIComponent(inst) + '&period=' + encodeURIComponent(period);
    fetch(url)
        .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
        .then(function(data) {
            if (data.error) {
                debugLog("K线错误: " + data.error, "error");
                return;
            }
            // [NEW] 缓存指标数据 (按窗口+周期存储)
            if (data.indicators) {
                var indKey = windowIdx + '_' + period;
                windowIndicators[indKey] = data.indicators;
                // 如果这是当前选中的窗口，更新右侧面板
                if (windowIdx === selectedWindow) {
                    updateIndicatorDashboard(data.indicators);
                    updateSignalsFromIndicators(data.indicators);
                }
            }
            updateChart(windowIdx, inst, period, data);
            setTimeout(function() { updateDragHandlePositions(windowIdx); }, 100);
        })
        .catch(function(err) {
            debugLog("获取K线失败 " + inst + ": " + err.message, "error");
        });
}

// [NEW] Real-time signal update from WebSocket kline/tick data
function updateSignalsRealtime(inst, tickInfo) {
    if (!inst || !tickInfo) return;
    var selectedInst = windowInstruments[selectedWindow];
    if (inst !== selectedInst) return;

    // Get current period's cached indicators for richer signal context
    var currentPeriod = windowPeriods[selectedWindow] || '1m';
    var indKey = selectedWindow + '_' + currentPeriod;
    var cachedInd = windowIndicators[indKey] || {};

    // Update spread from tick
    if (tickInfo.spread !== undefined) {
        var spreadEl = document.getElementById('dash-spread');
        if (spreadEl) {
            var spreadSpike = cachedInd.spread_spike || false;
            spreadEl.textContent = tickInfo.spread.toFixed(4) + (spreadSpike ? ' ⚠' : '');
            spreadEl.className = 'dash-value ' + (spreadSpike ? 'spike' : 'neutral');
        }
    }

    // Update key levels from cached indicators (period-aware)
    var keyLevels = cachedInd.key_levels || {};
    var klPivot = document.getElementById('kl-pivot');
    var klR1 = document.getElementById('kl-r1');
    var klS1 = document.getElementById('kl-s1');
    var dashPoc = document.getElementById('dash-poc');
    var dashVahVal = document.getElementById('dash-vah-val');
    if (klPivot) klPivot.textContent = keyLevels.pivot || '--';
    if (klR1) klR1.textContent = keyLevels.r1 || '--';
    if (klS1) klS1.textContent = keyLevels.s1 || '--';
    if (dashPoc) dashPoc.textContent = (cachedInd.volume_profile || {}).poc || '--';
    if (dashVahVal) dashVahVal.textContent = ((cachedInd.volume_profile || {}).vah || '--') + '/' + ((cachedInd.volume_profile || {}).val || '--');

    // Use BAR-LEVEL data for signals, not single tick
    var barDelta = tickInfo.bar_delta !== undefined ? tickInfo.bar_delta : tickInfo.delta;
    var barCvd = tickInfo.bar_cvd !== undefined ? tickInfo.bar_cvd : tickInfo.delta;
    var barVol = tickInfo.bar_volume !== undefined ? tickInfo.bar_volume : 0;

    // Update CVD dashboard in real-time
    var cvdEl = document.getElementById('dash-cvd');
    if (cvdEl && barCvd !== undefined) {
        cvdEl.textContent = (barCvd >= 0 ? '+' : '') + barCvd;
        cvdEl.className = 'dash-value ' + (barCvd >= 0 ? 'buy' : 'sell');
    }

    // Update NOI-Z approximation from bar data
    var noiZEl = document.getElementById('dash-noi-z');
    if (noiZEl && barVol > 0) {
        var noi = barDelta / barVol;
        var noiZ = noi > 0.3 ? 1.5 : noi < -0.3 ? -1.5 : 0;
        noiZEl.textContent = noiZ.toFixed(2);
        noiZEl.className = 'dash-value ' + (noiZ > 1 ? 'buy' : noiZ < -1 ? 'sell' : 'neutral');
    }

    // Update Vol-Z approximation
    var volZEl = document.getElementById('dash-vol-z');
    if (volZEl && barVol > 0) {
        var volZ = barVol > 500 ? 2.5 : barVol > 200 ? 1.0 : barVol < 50 ? -1.0 : 0;
        volZEl.textContent = volZ.toFixed(2);
        volZEl.className = 'dash-value ' + (volZ > 2 ? 'buy' : volZ < -2 ? 'sell' : 'neutral');
    }

    // Signal logic: use bar_delta for direction, bar_cvd for trend strength
    var sigEl = document.getElementById('sig-signal');
    var confEl = document.getElementById('sig-confidence');
    if (sigEl && confEl) {
        var signal = 'NEUTRAL';
        var confidence = 0;
        var reasons = [];

        if (barDelta > 20) {
            signal = 'LONG';
            confidence = Math.min(25 + barDelta, 90);
            reasons.push('barΔ+' + barDelta);
        } else if (barDelta < -20) {
            signal = 'SHORT';
            confidence = Math.min(25 + Math.abs(barDelta), 90);
            reasons.push('barΔ' + barDelta);
        }

        // CVD trend confirmation
        if (barCvd > 50 && signal !== 'SHORT') {
            confidence = Math.min(confidence + 15, 95);
            reasons.push('CVD+' + barCvd);
        } else if (barCvd < -50 && signal !== 'LONG') {
            confidence = Math.min(confidence + 15, 95);
            reasons.push('CVD' + barCvd);
        }

        // Volume confirmation
        if (barVol > 300) {
            confidence = Math.min(confidence + 10, 95);
            reasons.push('vol+' + barVol);
        }

        sigEl.textContent = signal;
        sigEl.style.color = signal === 'LONG' ? '#00d4aa' : signal === 'SHORT' ? '#ff4757' : '#888';
        confEl.textContent = confidence + '%';
        confEl.style.color = confidence > 70 ? '#00d4aa' : confidence > 40 ? '#f1c40f' : '#888';

        // Update large order count from bar volume (mock: large = >100)
        var loEl = document.getElementById('dash-large-count');
        if (loEl) {
            var largeCount = barVol > 100 ? Math.floor(barVol / 100) : 0;
            loEl.textContent = largeCount;
            loEl.style.color = largeCount > 0 ? '#f1c40f' : '#888';
        }
    }
}
