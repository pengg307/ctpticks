<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CTP 订单流实时监控 v2.0</title>
    <script src="/js/echarts.min.js" onerror="this.src='https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js'"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e1a;
            color: #e0e0e0;
            font-family: 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        .header {
            height: 44px;
            background: #1a1f2e;
            display: flex;
            align-items: center;
            padding: 0 12px;
            border-bottom: 1px solid #2a3040;
            flex-shrink: 0;
        }
        .header h1 {
            font-size: 15px;
            color: #00d4aa;
            margin-right: 10px;
            white-space: nowrap;
        }
        .header .status {
            font-size: 11px;
            color: #888;
            white-space: nowrap;
        }
        .header .status.connected { color: #00d4aa; }
        .header .btn-connect {
            margin-left: auto;
            padding: 5px 12px;
            background: #00d4aa;
            color: #000;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
        }
        .header .btn-connect:hover { background: #00b894; }
        .header .btn-connect:disabled { background: #666; cursor: not-allowed; }
        .header .btn-source {
            margin-left: 8px;
            padding: 5px 10px;
            background: #2a3040;
            color: #888;
            border: 1px solid #3a4050;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            white-space: nowrap;
        }
        .header .btn-source.mock { background: #00d4aa; color: #000; border-color: #00d4aa; }
        .header .btn-source.ctp { background: #e74c3c; color: #fff; border-color: #e74c3c; }
        .header .mode-btns {
            display: flex;
            gap: 6px;
            margin-left: 12px;
        }
        .header .mode-btn {
            padding: 4px 10px;
            background: #2a3040;
            border: 1px solid #3a4050;
            color: #888;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
        .header .mode-btn:hover,
        .header .mode-btn.active {
            background: #00d4aa;
            color: #000;
            border-color: #00d4aa;
        }

        .main-container {
            display: flex;
            height: calc(100vh - 44px);
            overflow: hidden;
        }
        .left-section {
            display: flex;
            flex: 1;
            min-width: 0;
        }
        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #1a1f2e;
            min-width: 0;
        }
        .chart-window {
            flex: 1;
            border-bottom: 1px solid #1a1f2e;
            position: relative;
            cursor: pointer;
            transition: box-shadow 0.2s;
            min-height: 0;
        }
        .chart-window:hover { box-shadow: inset 0 0 20px rgba(0,212,170,0.1); }
        .chart-window.active { box-shadow: inset 0 0 0 2px #00d4aa; }
        .chart-window .title-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 28px;
            background: rgba(26,31,46,0.95);
            display: flex;
            align-items: center;
            padding: 0 6px;
            z-index: 10;
            font-size: 11px;
        }
        .chart-window .title-bar .inst-select {
            background: #2a3040;
            border: 1px solid #3a4050;
            color: #fff;
            padding: 2px 4px;
            font-size: 10px;
            border-radius: 3px;
            cursor: pointer;
            max-width: 80px;
            margin-right: 4px;
        }
        .chart-window .title-bar .inst-select option {
            background: #1a1f2e;
            color: #fff;
        }
        .chart-window .title-bar .inst-name {
            color: #fff;
            font-weight: bold;
            margin-right: 6px;
            white-space: nowrap;
        }
        .chart-window .title-bar .price {
            color: #00d4aa;
            margin-right: 6px;
            font-family: monospace;
            font-size: 12px;
            transition: color 0.3s;
        }
        .chart-window .title-bar .price.down { color: #ff4757; }
        .chart-window .title-bar .price.up { color: #00ff88; }
        .chart-window .title-bar .period-selector {
            margin-left: auto;
            display: flex;
            gap: 2px;
        }
        .chart-window .title-bar .period-btn {
            background: #2a3040;
            border: 1px solid #3a4050;
            color: #888;
            padding: 2px 5px;
            font-size: 9px;
            cursor: pointer;
            border-radius: 3px;
            white-space: nowrap;
        }
        .chart-window .title-bar .period-btn:hover,
        .chart-window .title-bar .period-btn.active {
            background: #00d4aa;
            color: #000;
            border-color: #00d4aa;
        }
        .chart-container {
            width: 100%;
            height: 100%;
            padding-top: 28px;
        }
        .right-section {
            width: 380px;
            background: #0f1420;
            border-left: 2px solid #1a1f2e;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .right-header {
            height: 36px;
            background: #1a1f2e;
            display: flex;
            align-items: center;
            padding: 0 10px;
            border-bottom: 1px solid #2a3040;
            flex-shrink: 0;
        }
        .right-header .inst-title {
            font-size: 13px;
            color: #00d4aa;
            font-weight: bold;
        }
        .right-header .inst-code {
            font-size: 10px;
            color: #888;
            margin-left: 6px;
        }
        .indicator-dashboard {
            background: #121826;
            border-bottom: 1px solid #2a3040;
            padding: 8px 10px;
            flex-shrink: 0;
        }
        .indicator-dashboard .dash-title {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .indicator-dashboard .dash-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        .indicator-dashboard .dash-item {
            background: #1a1f2e;
            border-radius: 4px;
            padding: 5px 8px;
            border: 1px solid #2a3040;
        }
        .indicator-dashboard .dash-item .dash-label {
            font-size: 9px;
            color: #666;
            margin-bottom: 2px;
        }
        .indicator-dashboard .dash-item .dash-value {
            font-size: 13px;
            font-weight: bold;
            font-family: 'SF Mono', 'Consolas', monospace;
        }
        .indicator-dashboard .dash-item .dash-value.buy { color: #00d4aa; }
        .indicator-dashboard .dash-item .dash-value.sell { color: #ff4757; }
        .indicator-dashboard .dash-item .dash-value.neutral { color: #888; }
        .indicator-dashboard .dash-item .dash-value.spike {
            color: #ff4757;
            animation: pulseRed 1s infinite;
        }
        @keyframes pulseRed {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .key-levels-table {
            margin-top: 6px;
            border-top: 1px solid #2a3040;
            padding-top: 6px;
        }
        .key-levels-table .kl-row {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            padding: 1px 0;
        }
        .key-levels-table .kl-row .kl-label { color: #666; }
        .key-levels-table .kl-row .kl-value { font-family: monospace; }
        .key-levels-table .kl-row .kl-value.res { color: #ff6b6b; }
        .key-levels-table .kl-row .kl-value.sup { color: #00d4aa; }
        .key-levels-table .kl-row .kl-value.pivot { color: #f1c40f; }
        .orderflow-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px;
            -webkit-overflow-scrolling: touch;
        }
        .orderflow-item {
            display: flex;
            align-items: center;
            padding: 2px 5px;
            margin-bottom: 1px;
            border-radius: 3px;
            font-size: 11px;
            font-family: 'SF Mono', 'Consolas', monospace;
        }
        .orderflow-item.buy { background: rgba(0,212,170,0.08); }
        .orderflow-item.sell { background: rgba(255,71,87,0.08); }
        .orderflow-item.mix { background: rgba(136,136,136,0.05); }
        .orderflow-item .time { width: 55px; color: #666; font-size: 10px; }
        .orderflow-item .price { width: 65px; text-align: right; }
        .orderflow-item .vol { width: 35px; text-align: center; font-size: 10px; }
        .orderflow-item .buy-v { width: 40px; text-align: right; color: #00d4aa; font-size: 10px; }
        .orderflow-item .sell-v { width: 40px; text-align: right; color: #ff4757; font-size: 10px; }
        .orderflow-item .delta { width: 45px; text-align: right; font-weight: bold; font-size: 10px; }
        .orderflow-item .dir {
            width: 26px;
            text-align: center;
            font-size: 9px;
            border-radius: 3px;
            padding: 1px 0;
            margin-left: 4px;
        }
        .orderflow-item.buy .dir { background: #00d4aa; color: #000; }
        .orderflow-item.sell .dir { background: #ff4757; color: #fff; }
        .orderflow-item.mix .dir { background: #666; color: #fff; }
        .stats-bar {
            height: 56px;
            background: #1a1f2e;
            border-top: 1px solid #2a3040;
            padding: 6px 10px;
            font-size: 11px;
            flex-shrink: 0;
        }
        .stats-bar .row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 3px;
        }
        .stats-bar .label { color: #888; }
        .stats-bar .value { color: #fff; font-weight: bold; }
        .stats-bar .value.buy { color: #00d4aa; }
        .stats-bar .value.sell { color: #ff4757; }
        .debug-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1a1f2e;
            border-top: 1px solid #2a3040;
            padding: 6px 12px;
            font-size: 10px;
            color: #888;
            max-height: 100px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }
        .debug-panel.visible { display: block; }
        .debug-panel .log-entry { margin-bottom: 2px; }
        .debug-panel .log-time { color: #666; }
        .debug-panel .log-info { color: #00d4ff; }
        .debug-panel .log-error { color: #e94560; }
        .debug-panel .log-success { color: #00ff88; }
        .debug-panel .log-warn { color: #f1c40f; }

        .mobile-toggle {
            display: none;
            position: fixed;
            bottom: 110px;
            right: 10px;
            width: 40px;
            height: 40px;
            background: #00d4aa;
            color: #000;
            border: none;
            border-radius: 50%;
            font-size: 18px;
            z-index: 50;
            cursor: pointer;
            align-items: center;
            justify-content: center;
        }

        @keyframes flashNew {
            0% { background-color: rgba(0,212,170,0.4); }
            100% { background-color: transparent; }
        }
        .orderflow-item.flash-new {
            animation: flashNew 0.6s ease-out;
        }

        @keyframes priceFlashUp {
            0% { color: #00ff88; text-shadow: 0 0 8px rgba(0,255,136,0.5); }
            100% { color: #00d4aa; text-shadow: none; }
        }
        @keyframes priceFlashDown {
            0% { color: #ff4757; text-shadow: 0 0 8px rgba(255,71,87,0.5); }
            100% { color: #ff4757; text-shadow: none; }
        }
        .price.flash-up { animation: priceFlashUp 0.5s ease-out; }
        .price.flash-down { animation: priceFlashDown 0.5s ease-out; }

        /* 手机响应式 */
        @media (max-width: 768px) {
            body { overflow: auto; }
            .header { height: 40px; padding: 0 8px; }
            .header h1 { font-size: 13px; }
            .header .mode-btns { display: none; }
            .main-container {
                flex-direction: column;
                height: auto;
                min-height: calc(100vh - 40px);
            }
            .left-section {
                flex-direction: column;
                height: auto;
            }
            .column {
                flex-direction: row;
                flex-wrap: wrap;
                border-right: none;
                border-bottom: 1px solid #1a1f2e;
            }
            .chart-window {
                width: 100%;
                height: 280px;
                border-bottom: 1px solid #1a1f2e;
            }
            .right-section {
                width: 100%;
                height: 400px;
                border-left: none;
                border-top: 2px solid #1a1f2e;
            }
            .mobile-toggle { display: flex; }
        }

        @media (max-width: 480px) {
            .chart-window { height: 220px; }
            .chart-window .title-bar .period-selector { display: none; }
            .chart-window.active .title-bar .period-selector { display: flex; }
            .orderflow-item { font-size: 10px; padding: 2px 4px; }
            .orderflow-item .time { width: 50px; }
            .orderflow-item .price { width: 55px; }
            .orderflow-item .vol { width: 30px; }
            .orderflow-item .buy-v, .orderflow-item .sell-v { width: 35px; }
            .orderflow-item .delta { width: 40px; }
        }

        .grid-drag-handle {
            position: absolute;
            left: 10%;
            right: 6%;
            height: 6px;
            z-index: 100;
            cursor: row-resize;
            background: transparent;
            transition: background 0.2s;
        }
        .grid-drag-handle:hover {
            background: rgba(0, 212, 170, 0.3);
        }
        .grid-drag-handle.dragging {
            background: rgba(0, 212, 170, 0.6);
        }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #0a0e1a; }
        ::-webkit-scrollbar-thumb { background: #2a3040; border-radius: 2px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>CTP订单流 v2.0</h1>
        <div class="mode-btns">
            <button class="mode-btn active" id="btnMode2" onclick="changeMode(2)">2窗口</button>
            <button class="mode-btn" id="btnMode4" onclick="changeMode(4)">4窗口</button>
            <button class="mode-btn" id="btnMode6" onclick="changeMode(6)">6窗口</button>
        </div>
        <span class="status" id="conn-status">未连接</span>
        <button class="btn-source mock" id="btnSource" title="点击切换Mock/CTP">Mock</button>
        <button class="btn-connect" id="btnConnect">连接</button>
    </div>
    <div class="main-container">
        <div class="left-section" id="left-section"></div>
        <div class="right-section">
            <div class="right-header">
                <span class="inst-title" id="right-title">--</span>
                <span class="inst-code" id="right-code">--</span>
            </div>
            <div class="indicator-dashboard" id="indicator-dashboard">
                <div class="dash-title">指标面板</div>
                <div class="dash-grid">
                    <div class="dash-item">
                        <div class="dash-label">Spread</div>
                        <div class="dash-value neutral" id="dash-spread">--</div>
                    </div>
                    <div class="dash-item">
                        <div class="dash-label">Vol Z-Score</div>
                        <div class="dash-value neutral" id="dash-vol-z">--</div>
                    </div>
                    <div class="dash-item">
                        <div class="dash-label">CVD</div>
                        <div class="dash-value neutral" id="dash-cvd">--</div>
                    </div>
                    <div class="dash-item">
                        <div class="dash-label">CVD Slope</div>
                        <div class="dash-value neutral" id="dash-cvd-slope">--</div>
                    </div>
                    <div class="dash-item">
                        <div class="dash-label">NOI Z-Score</div>
                        <div class="dash-value neutral" id="dash-noi-z">--</div>
                    </div>
                    <div class="dash-item">
                        <div class="dash-label">VWAP</div>
                        <div class="dash-value neutral" id="dash-vwap">--</div>
                    </div>
                </div>
                <div class="key-levels-table" id="key-levels-table">
                    <div class="kl-row"><span class="kl-label">Pivot</span><span class="kl-value pivot" id="kl-pivot">--</span></div>
                    <div class="kl-row"><span class="kl-label">R1 / S1</span><span class="kl-value"><span class="res" id="kl-r1">--</span> / <span class="sup" id="kl-s1">--</span></span></div>
                    <div class="kl-row"><span class="kl-label">R2 / S2</span><span class="kl-value"><span class="res" id="kl-r2">--</span> / <span class="sup" id="kl-s2">--</span></span></div>
                    <div class="kl-row"><span class="kl-label">R3 / S3</span><span class="kl-value"><span class="res" id="kl-r3">--</span> / <span class="sup" id="kl-s3">--</span></span></div>
                </div>
            </div>
            <div class="orderflow-list" id="orderflow-list">
                <div style="text-align:center; color:#666; padding-top:50px;">点击"连接"开始接收数据</div>
            </div>
            <div class="stats-bar">
                <div class="row">
                    <span class="label">主动买:</span>
                    <span class="value buy" id="stat-buy">0</span>
                </div>
                <div class="row">
                    <span class="label">主动卖:</span>
                    <span class="value sell" id="stat-sell">0</span>
                </div>
                <div class="row">
                    <span class="label">净Δ:</span>
                    <span class="value" id="stat-delta">0</span>
                </div>
                <div class="row" style="margin-top:4px; border-top:1px solid #2a3040; padding-top:4px;">
                    <span class="label" id="of-stat-label">显示: 0条</span>
                    <span class="value" id="of-time-range" style="font-size:9px; color:#666;">--</span>
                </div>
            </div>
        </div>
    </div>
    <div class="debug-panel" id="debugPanel">
        <div style="color:#666; margin-bottom:4px; display:flex; justify-content:space-between;">
            <span>调试日志</span>
            <span style="cursor:pointer; color:#888;" onclick="toggleDebug()">✕</span>
        </div>
        <div id="debugLogs"></div>
    </div>
    <button class="mobile-toggle" id="mobileToggle" onclick="toggleDebug()">📋</button>

<script>
// ==================== 后端注入的配置 ====================
const SERVER_CONFIG = $SERVER_CONFIG;
const ALL_INSTRUMENTS = SERVER_CONFIG.all_instruments || [];
const ALL_INSTRUMENT_NAMES = SERVER_CONFIG.instrument_names || {};
const PERIODS = SERVER_CONFIG.periods || ["1m", "5m", "15m", "1h"];
const DEFAULT_MODE = SERVER_CONFIG.default_mode || 2;
const DEFAULT_WINDOWS = SERVER_CONFIG.default_windows || [];

// ==================== 服务器配置 ====================
const SERVER_HOST = window.location.host || "localhost:8080";
const WS_HOST = (window.location.protocol === 'file:' || !window.location.host) 
    ? "localhost:8080" 
    : window.location.host;
const WS_URL = (window.location.protocol === 'https:' ? 'wss://' : 'ws://') + WS_HOST + "/ws";
const API_BASE = (window.location.protocol === 'file:' ? 'http:' : window.location.protocol) + '//' + WS_HOST;

// ==================== 状态变量 ====================
let windowMode = DEFAULT_MODE;
let windowInstruments = DEFAULT_WINDOWS.slice(0, windowMode);
let selectedWindow = 0;
let windowPeriods = {};
const charts = {};
let ws = null;
let isConnected = false;
let currentSource = 'mock';
let reconnectTimer = null;
let heartbeatTimer = null;
let isConnecting = false;
let lastPrices = {};
let ofUserScrolled = false;
let ofAutoReturnTimer = null;
let ofLastItemTime = "";

// [NEW] 缓存每个窗口的最新指标数据
let windowIndicators = {};

const DEFAULT_GRID_RATIOS = [0.35, 0.12, 0.12, 0.12, 0.12, 0.17];
let gridRatios = {};

// ==================== 工具函数 ====================
function debugLog(msg, type) {
    const logs = document.getElementById('debugLogs');
    const time = new Date().toLocaleTimeString('zh-CN', {hour12:false});
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = '<span class="log-time">[' + time + ']</span> <span class="log-' + (type||'info') + '">' + escapeHtml(msg) + '</span>';
    logs.insertBefore(entry, logs.firstChild);
    while (logs.children.length > 30) logs.removeChild(logs.lastChild);
    console.log('[' + type + '] ' + msg);
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function toggleDebug() {
    document.getElementById('debugPanel').classList.toggle('visible');
}

// ==================== 窗口模式切换 ====================
function changeMode(mode) {
    if (mode === windowMode) return;
    windowMode = mode;
    document.getElementById('btnMode2').classList.toggle('active', mode === 2);
    document.getElementById('btnMode4').classList.toggle('active', mode === 4);
    document.getElementById('btnMode6').classList.toggle('active', mode === 6);
    if (ws && isConnected) {
        ws.send(JSON.stringify({action: 'change_mode', mode: mode}));
    }
    initLayout();
    setTimeout(function() {
        for (var i = 0; i < windowMode; i++) {
            var inst = windowInstruments[i] || DEFAULT_WINDOWS[i] || ALL_INSTRUMENTS[0];
            windowInstruments[i] = inst;
            initChart(i, inst);
        }
    }, 300);
    debugLog('切换为 ' + mode + ' 窗口模式', 'info');
}

function changeWindowInstrument(windowIdx, inst) {
    windowInstruments[windowIdx] = inst;
    if (ws && isConnected) {
        ws.send(JSON.stringify({action: 'change_instrument', window_idx: windowIdx, instrument: inst}));
    }
    var period = windowPeriods[windowIdx] || '1m';
    fetchKlineData(inst, period, windowIdx);
    debugLog('窗口 ' + windowIdx + ' -> ' + inst, 'info');
}

// ==================== 布局初始化 ====================
function initLayout() {
    debugLog("初始化布局...", "info");
    const leftSection = document.getElementById('left-section');
    leftSection.innerHTML = '';

    var colCount = 2;
    var rowCount = windowMode / colCount;

    var col1 = document.createElement('div');
    col1.className = 'column';
    var col2 = document.createElement('div');
    col2.className = 'column';

    for (var i = 0; i < windowMode; i++) {
        var col = i < rowCount ? col1 : col2;
        var inst = windowInstruments[i] || DEFAULT_WINDOWS[i] || ALL_INSTRUMENTS[0];
        windowInstruments[i] = inst;
        if (!windowPeriods[i]) windowPeriods[i] = PERIODS[0] || '1m';

        var win = document.createElement('div');
        win.className = 'chart-window' + (i === 0 ? ' active' : '');
        win.id = 'window-' + i;
        win.dataset.index = i;
        win.dataset.inst = inst;

        var selectOptions = '';
        ALL_INSTRUMENTS.forEach(function(code) {
            var selected = code === inst ? ' selected' : '';
            var name = ALL_INSTRUMENT_NAMES[code] || code;
            selectOptions += '<option value="' + code + '"' + selected + '>' + name + '</option>';
        });

        var periodButtons = '';
        PERIODS.forEach(function(p) {
            var activeClass = p === windowPeriods[i] ? 'active' : '';
            periodButtons += '<button class="period-btn ' + activeClass + '" data-period="' + p + '">' + p + '</button>';
        });

        win.innerHTML = '<div class="title-bar">' +
            '<select class="inst-select" data-idx="' + i + '">' + selectOptions + '</select>' +
            '<span class="price" id="price-' + i + '">--</span>' +
            '<div class="period-selector">' + periodButtons + '</div>' +
            '</div>' +
            '<div class="chart-container" id="chart-' + i + '"></div>';

        col.appendChild(win);
    }

    leftSection.appendChild(col1);
    leftSection.appendChild(col2);

    for (var i = 0; i < windowMode; i++) {
        (function(idx) {
            var win = document.getElementById('window-' + idx);
            if (!win) return;
            win.addEventListener('click', function(e) {
                if (e.target.tagName === 'SELECT' || e.target.tagName === 'OPTION' || e.target.classList.contains('period-btn') || e.target.classList.contains('grid-drag-handle')) return;
                selectWindow(idx);
            });
            var select = win.querySelector('.inst-select');
            if (select) {
                select.addEventListener('change', function(e) {
                    changeWindowInstrument(idx, e.target.value);
                });
            }
            win.querySelectorAll('.period-btn').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    changePeriod(idx, btn.dataset.period);
                });
            });
        })(i);
    }

    setTimeout(function() {
        for (var i = 0; i < windowMode; i++) {
            initChart(i, windowInstruments[i]);
        }
    }, 200);
}

function initChart(windowIdx, inst) {
    var container = document.getElementById('chart-' + windowIdx);
    if (!container) return;
    if (charts[windowIdx]) {
        charts[windowIdx].dispose();
        delete charts[windowIdx];
    }
    try {
        var chart = echarts.init(container, 'dark');
        charts[windowIdx] = chart;
        fetchKlineData(inst, windowPeriods[windowIdx] || '1m', windowIdx);
        window.addEventListener('resize', function() { chart.resize(); });
        setTimeout(function() { createGridDragHandles(windowIdx); }, 500);
    } catch (e) {
        debugLog("图表初始化失败 " + windowIdx + ": " + e.message, "error");
    }
}

function createGridDragHandles(windowIdx) {
    var container = document.getElementById('chart-' + windowIdx);
    if (!container) return;
    var oldHandles = container.querySelectorAll('.grid-drag-handle');
    oldHandles.forEach(function(h) { h.remove(); });
    for (var i = 0; i < 5; i++) {
        var handle = document.createElement('div');
        handle.className = 'grid-drag-handle';
        handle.dataset.handleIndex = i;
        handle.dataset.windowIdx = windowIdx;
        handle.style.left = '10%';
        handle.style.right = '6%';
        handle.style.top = '0%';
        container.appendChild(handle);
        handle.addEventListener('mousedown', onDragHandleMouseDown);
    }
    updateDragHandlePositions(windowIdx);
}

function updateDragHandlePositions(windowIdx) {
    var container = document.getElementById('chart-' + windowIdx);
    if (!container) return;
    var chart = charts[windowIdx];
    if (!chart) return;
    var option = chart.getOption();
    if (!option || !option.grid) return;
    var handles = container.querySelectorAll('.grid-drag-handle');
    handles.forEach(function(handle, i) {
        var grid = option.grid[i];
        if (!grid) return;
        var top = parseFloat(grid.top) || 0;
        var height = parseFloat(grid.height) || 0;
        var bottom = top + height;
        handle.style.top = bottom + '%';
    });
}

var dragState = null;
function onDragHandleMouseDown(e) {
    e.preventDefault();
    e.stopPropagation();
    var handle = e.currentTarget;
    var windowIdx = parseInt(handle.dataset.windowIdx);
    var handleIdx = parseInt(handle.dataset.handleIndex);
    var container = document.getElementById('chart-' + windowIdx);
    dragState = {
        windowIdx: windowIdx,
        handleIdx: handleIdx,
        startY: e.clientY,
        containerHeight: container.clientHeight,
        startRatios: (gridRatios[windowIdx + '_' + (windowPeriods[windowIdx] || '1m')] || DEFAULT_GRID_RATIOS.slice()).slice()
    };
    handle.classList.add('dragging');
    document.addEventListener('mousemove', onDragHandleMouseMove);
    document.addEventListener('mouseup', onDragHandleMouseUp);
}

function onDragHandleMouseMove(e) {
    if (!dragState) return;
    var deltaY = e.clientY - dragState.startY;
    var deltaRatio = deltaY / dragState.containerHeight;
    var ratios = dragState.startRatios.slice();
    var idx = dragState.handleIdx;
    ratios[idx] += deltaRatio;
    ratios[idx + 1] -= deltaRatio;
    var minRatio = 0.05;
    if (ratios[idx] < minRatio) {
        ratios[idx + 1] += ratios[idx] - minRatio;
        ratios[idx] = minRatio;
    }
    if (ratios[idx + 1] < minRatio) {
        ratios[idx] += ratios[idx + 1] - minRatio;
        ratios[idx + 1] = minRatio;
    }
    var key = dragState.windowIdx + '_' + (windowPeriods[dragState.windowIdx] || '1m');
    gridRatios[key] = ratios;
    var chart = charts[dragState.windowIdx];
    if (chart) {
        chart.setOption({ grid: getChartGrids(dragState.windowIdx) });
        updateDragHandlePositions(dragState.windowIdx);
    }
}

function onDragHandleMouseUp(e) {
    if (!dragState) return;
    var container = document.getElementById('chart-' + dragState.windowIdx);
    if (container) {
        var handles = container.querySelectorAll('.grid-drag-handle');
        handles.forEach(function(h) { h.classList.remove('dragging'); });
    }
    dragState = null;
    document.removeEventListener('mousemove', onDragHandleMouseMove);
    document.removeEventListener('mouseup', onDragHandleMouseUp);
}


function fetchKlineData(inst, period, windowIdx) {
    var url = API_BASE + '/api/klines?inst=' + encodeURIComponent(inst) + '&period=' + encodeURIComponent(period);
    fetch(url)
        .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
        .then(function(data) {
            if (data.error) {
                debugLog("K线错误: " + data.error, "error");
                return;
            }
            // [NEW] 缓存指标数据
            if (data.indicators) {
                windowIndicators[windowIdx] = data.indicators;
                // 如果这是当前选中的窗口，更新右侧面板
                if (windowIdx === selectedWindow) {
                    updateIndicatorDashboard(data.indicators);
                }
            }
            updateChart(windowIdx, inst, period, data);
            setTimeout(function() { updateDragHandlePositions(windowIdx); }, 100);
        })
        .catch(function(err) {
            debugLog("获取K线失败 " + inst + ": " + err.message, "error");
        });
}

// [NEW] 更新右侧指标面板
function updateIndicatorDashboard(indicators) {
    if (!indicators) return;

    var keyLevels = indicators.key_levels || {};
    document.getElementById('kl-pivot').textContent = keyLevels.pivot || '--';
    document.getElementById('kl-r1').textContent = keyLevels.r1 || '--';
    document.getElementById('kl-s1').textContent = keyLevels.s1 || '--';
    document.getElementById('kl-r2').textContent = keyLevels.r2 || '--';
    document.getElementById('kl-s2').textContent = keyLevels.s2 || '--';
    document.getElementById('kl-r3').textContent = keyLevels.r3 || '--';
    document.getElementById('kl-s3').textContent = keyLevels.s3 || '--';

    var vwapData = indicators.vwap || [];
    var cvdData = indicators.cvd || [];
    var cvdSlopeData = indicators.cvd_slope || [];
    var noiZData = indicators.noi_zscore || [];
    var volZData = indicators.volume_zscore || [];

    var lastVwap = vwapData.length > 0 ? vwapData[vwapData.length - 1] : '--';
    var lastCvd = cvdData.length > 0 ? cvdData[cvdData.length - 1] : '--';
    var lastCvdSlope = cvdSlopeData.length > 0 ? cvdSlopeData[cvdSlopeData.length - 1] : '--';
    var lastNoiZ = noiZData.length > 0 ? noiZData[noiZData.length - 1] : '--';
    var lastVolZ = volZData.length > 0 ? volZData[volZData.length - 1] : '--';
    var currentSpread = indicators.current_spread || 0;
    var spreadSpike = indicators.spread_spike || false;

    var vwapEl = document.getElementById('dash-vwap');
    vwapEl.textContent = typeof lastVwap === 'number' ? lastVwap.toFixed(2) : lastVwap;

    var cvdEl = document.getElementById('dash-cvd');
    cvdEl.textContent = typeof lastCvd === 'number' ? (lastCvd >= 0 ? '+' : '') + lastCvd : lastCvd;
    cvdEl.className = 'dash-value ' + (typeof lastCvd === 'number' ? (lastCvd >= 0 ? 'buy' : 'sell') : 'neutral');

    var cvdSlopeEl = document.getElementById('dash-cvd-slope');
    cvdSlopeEl.textContent = typeof lastCvdSlope === 'number' ? (lastCvdSlope >= 0 ? '▲ ' : '▼ ') + Math.abs(lastCvdSlope).toFixed(1) : lastCvdSlope;
    cvdSlopeEl.className = 'dash-value ' + (typeof lastCvdSlope === 'number' ? (lastCvdSlope >= 0 ? 'buy' : 'sell') : 'neutral');

    var noiZEl = document.getElementById('dash-noi-z');
    noiZEl.textContent = typeof lastNoiZ === 'number' ? lastNoiZ.toFixed(2) : lastNoiZ;
    noiZEl.className = 'dash-value ' + (typeof lastNoiZ === 'number' ? (lastNoiZ > 1 ? 'buy' : lastNoiZ < -1 ? 'sell' : 'neutral') : 'neutral');

    var volZEl = document.getElementById('dash-vol-z');
    volZEl.textContent = typeof lastVolZ === 'number' ? lastVolZ.toFixed(2) : lastVolZ;
    volZEl.className = 'dash-value ' + (typeof lastVolZ === 'number' ? (lastVolZ > 2 ? 'buy' : lastVolZ < -2 ? 'sell' : 'neutral') : 'neutral');

    var spreadEl = document.getElementById('dash-spread');
    spreadEl.textContent = currentSpread.toFixed(4);
    if (spreadSpike) {
        spreadEl.className = 'dash-value spike';
        spreadEl.textContent = currentSpread.toFixed(4) + ' ⚠';
    } else {
        spreadEl.className = 'dash-value neutral';
    }
}

function updateChart(windowIdx, inst, period, data) {
    var chart = charts[windowIdx];
    if (!chart) return;

    var klines = data.klines || [];
    var macd = data.macd || { dif: [], dea: [], macd: [] };
    var indicators = data.indicators || {};

    if (klines.length === 0) {
        debugLog(inst + " " + period + " 无K线数据", "warn");
        return;
    }

    var dates = klines.map(function(k) { return k.time; });
    var candleData = klines.map(function(k) { return [k.open, k.close, k.low, k.high]; });

    var buyVolumes = klines.map(function(k) {
        return { value: k.buy_vol || 0, itemStyle: { color: '#00d4aa' } };
    });
    var sellVolumes = klines.map(function(k) {
        return { value: k.sell_vol || 0, itemStyle: { color: '#ff4757' } };
    });

    // [NEW] 提取指标数据
    var vwapData = indicators.vwap || [];
    var cvdData = indicators.cvd || [];
    var cvdSlopeData = indicators.cvd_slope || [];
    var noiData = indicators.noi || [];
    var noiZData = indicators.noi_zscore || [];
    var volZData = indicators.volume_zscore || [];
    var keyLevels = indicators.key_levels || {};
    var spreadData = [];

    // 为每根K线生成一个spread值（使用tick数据近似）
    for (var i = 0; i < klines.length; i++) {
        var bar = klines[i];
        var spread = 0;
        if (bar.ask && bar.bid) {
            spread = bar.ask - bar.bid;
        } else if (bar.high && bar.low) {
            spread = (bar.high - bar.low) * 0.02;
        }
        spreadData.push({
            value: spread,
            itemStyle: { color: spread > (indicators.current_spread || 0) * 2 ? '#ff4757' : '#666' }
        });
    }

    // [NEW] 构建markLine数据（关键价位）
    var markLines = [];
    if (keyLevels.pivot) {
        markLines.push({ yAxis: keyLevels.pivot, name: 'Pivot', lineStyle: { color: '#f1c40f', type: 'dashed', width: 1 } });
    }
    if (keyLevels.r1) markLines.push({ yAxis: keyLevels.r1, name: 'R1', lineStyle: { color: '#ff6b6b', type: 'dotted', width: 1 } });
    if (keyLevels.r2) markLines.push({ yAxis: keyLevels.r2, name: 'R2', lineStyle: { color: '#ff6b6b', type: 'dotted', width: 1 } });
    if (keyLevels.s1) markLines.push({ yAxis: keyLevels.s1, name: 'S1', lineStyle: { color: '#00d4aa', type: 'dotted', width: 1 } });

            { type: 'category', data: dates, gridIndex: 0, axisLine: { lineStyle: { color: '#333' } }, axisLabel: { color: '#666', fontSize: 9 } },
            { type: 'category', data: dates, gridIndex: 1, axisLine: { lineStyle: { color: '#333' } }, axisLabel: { show: false } },
            { type: 'category', data: dates, gridIndex: 2, axisLine: { lineStyle: { color: '#333' } }, axisLabel: { show: false } },
            { type: 'category', data: dates, gridIndex: 3, axisLine: { lineStyle: { color: '#333' } }, axisLabel: { show: false } },
            { type: 'category', data: dates, gridIndex: 4, axisLine: { lineStyle: { color: '#333' } }, axisLabel: { show: false } },
            { type: 'category', data: dates, gridIndex: 5, axisLine: { lineStyle: { color: '#333' } }, axisLabel: { color: '#666', fontSize: 9 } }
        ],
        yAxis: [
            { scale: true, gridIndex: 0, splitLine: { lineStyle: { color: '#1a1f2e' } }, axisLabel: { color: '#888', fontSize: 9 } },
            { scale: true, gridIndex: 1, splitLine: { show: false }, axisLabel: { show: false } },
            { scale: true, gridIndex: 2, splitLine: { lineStyle: { color: '#1a1f2e' } }, axisLabel: { color: '#888', fontSize: 9 } },
            { scale: true, gridIndex: 3, splitLine: { lineStyle: { color: '#1a1f2e' } }, axisLabel: { color: '#888', fontSize: 9 } },
            { scale: true, gridIndex: 4, splitLine: { lineStyle: { color: '#1a1f2e' } }, axisLabel: { color: '#888', fontSize: 9 } },
            { scale: true, gridIndex: 5, splitLine: { lineStyle: { color: '#1a1f2e' } }, axisLabel: { color: '#888', fontSize: 9 } }

                if (vals['NOI'] !== undefined || vals['NOI Z-Score'] !== undefined) {
                    html += '<div style="margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid #333;">' +
                        '<div style="color:#888;font-size:10px;margin-bottom:3px;">▬ NOI</div>' +
                        'NOI <span style="color:#1abc9c">' + (vals['NOI'] !== undefined ? vals['NOI'].toFixed(4) : '--') + '</span>';
                    if (vals['NOI Z-Score'] !== undefined) {
                        var nzColor = vals['NOI Z-Score'] > 1 ? '#00ff88' : vals['NOI Z-Score'] < -1 ? '#ff6b6b' : '#888';
                        html += '<br/>Z-Score <span style="color:' + nzColor + '">' + vals['NOI Z-Score'] + '</span>';
                    }
                    html += '</div>';
                }

                // Panel 4: MACD
                if (vals['DIF'] !== undefined || vals['DEA'] !== undefined || vals['MACD'] !== undefined) {
                    html += '<div style="margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid #333;">' +
                        '<div style="color:#888;font-size:10px;margin-bottom:3px;">▬ MACD</div>' +
                        'DIF <span style="color:#f1c40f">' + (vals['DIF'] !== undefined ? vals['DIF'] : '--') + '</span> ' +
                        'DEA <span style="color:#3498db">' + (vals['DEA'] !== undefined ? vals['DEA'] : '--') + '</span><br/>' +
                        'MACD <span style="color:' + ((vals['MACD'] !== undefined && vals['MACD'] >= 0) ? '#00ff88' : '#ff6b6b') + '">' + 
                        (vals['MACD'] !== undefined ? ((vals['MACD'] >= 0 ? '+' : '') + vals['MACD']) : '--') + '</span>' +
                        '</div>';
                }

                // Panel 5: Spread
                if (vals['Spread'] !== undefined) {
                    html += '<div style="margin-bottom:6px;">' +
                        '<div style="color:#888;font-size:10px;margin-bottom:3px;">▬ Spread</div>' +
                        'Spread <span style="color:#e67e22">' + vals['Spread'] + '</span>' +
                        '</div>';
                }

                return html;
            }
        }
    };

    chart.__klines = klines.slice();
    chart.setOption(option, true);
}


// [NEW] 6-panel grid layout
function getChartGrids(windowIdx) {
    var key = windowIdx + '_' + (windowPeriods[windowIdx] || '1m');
    var ratios = gridRatios[key] || DEFAULT_GRID_RATIOS.slice();
    var total = ratios.reduce(function(a, b) { return a + b; }, 0);
    var normalized = ratios.map(function(r) { return r / total; });

    var top = 6;
    var available = 88;
    var grids = [];
    for (var i = 0; i < 6; i++) {
        var height = normalized[i] * available;
        grids.push({
            left: '10%',
            right: '6%',
            top: top + '%',
            height: height + '%'
        });
        top += height;
    }
    return grids;
}

function updateOrderflow(items) {
    var list = document.getElementById('orderflow-list');
    if (!items || items.length === 0) {
        if (list.children.length === 0) {
            list.innerHTML = '<div style="text-align:center; color:#666; padding-top:50px;">暂无数据</div>';
        }
        return;
    }

    var filteredItems = items.filter(function(item) {
        return (item.buy_vol || 0) > 0 || (item.sell_vol || 0) > 0;
    });

    if (filteredItems.length === 0) return;

    var existingTimes = {};
    var children = list.querySelectorAll('.orderflow-item');
    for (var i = 0; i < children.length; i++) {
        var timeEl = children[i].querySelector('.time');
        if (timeEl) existingTimes[timeEl.textContent] = true;
    }

    var newItems = filteredItems.filter(function(item) {
        return !existingTimes[item.time || ''];
    });

    if (newItems.length === 0) return;

    if (list.children.length === 1 && list.children[0].textContent.indexOf('暂无') >= 0) {
        list.innerHTML = '';
    }

    var buyTotal = 0, sellTotal = 0, deltaTotal = 0;
    for (var i = 0; i < children.length; i++) {
        var buyV = parseInt(children[i].querySelector('.buy-v').textContent) || 0;
        var sellV = parseInt(children[i].querySelector('.sell-v').textContent) || 0;
        var deltaV = parseInt(children[i].querySelector('.delta').textContent) || 0;
        buyTotal += buyV;
        sellTotal += sellV;
        deltaTotal += deltaV;
    }

    var currentLastTime = ofLastItemTime;
    var fragment = document.createDocumentFragment();
    newItems.forEach(function(item) {
        var cls = item.aggressor === 'BUY' ? 'buy' : item.aggressor === 'SELL' ? 'sell' : 'mix';
        var dirText = item.aggressor === 'BUY' ? '买' : item.aggressor === 'SELL' ? '卖' : '混';
        buyTotal += item.buy_vol || 0;
        sellTotal += item.sell_vol || 0;
        deltaTotal += item.delta || 0;
        var price = (item.price || 0).toFixed(2);
        var deltaStr = (item.delta || 0) >= 0 ? '+' + (item.delta || 0) : '' + (item.delta || 0);
        var deltaColor = (item.delta || 0) >= 0 ? '#00d4aa' : '#ff4757';
        var itemTime = (item.time || '') + (item.millisec ? '.' + item.millisec : '');
        var isNew = itemTime > currentLastTime;
        var flashClass = isNew ? ' flash-new' : '';
        var div = document.createElement('div');
        div.className = 'orderflow-item ' + cls + flashClass;
        div.innerHTML =
            '<span class="time">' + (item.time || '--') + '</span>' +
            '<span class="price">' + price + '</span>' +
            '<span class="vol">' + (item.total_vol || 0) + '</span>' +
            '<span class="buy-v">' + (item.buy_vol || 0) + '</span>' +
            '<span class="sell-v">' + (item.sell_vol || 0) + '</span>' +
            '<span class="delta" style="color:' + deltaColor + '">' + deltaStr + '</span>' +
            '<span class="dir">' + dirText + '</span>';
        fragment.appendChild(div);
    });

    list.appendChild(fragment);

    var maxDisplay = 500;
    while (list.children.length > maxDisplay) {
        var firstChild = list.children[0];
        var buyV = parseInt(firstChild.querySelector('.buy-v').textContent) || 0;
        var sellV = parseInt(firstChild.querySelector('.sell-v').textContent) || 0;
        var deltaV = parseInt(firstChild.querySelector('.delta').textContent) || 0;
        buyTotal -= buyV;
        sellTotal -= sellV;
        deltaTotal -= deltaV;
        list.removeChild(firstChild);
    }

    if (!ofUserScrolled) {
        list.scrollTop = list.scrollHeight;
    }

    if (filteredItems.length > 0) {
        var lastItem = filteredItems[filteredItems.length - 1];
        ofLastItemTime = (lastItem.time || '') + (lastItem.millisec ? '.' + lastItem.millisec : '');
    }

    document.getElementById('stat-buy').textContent = buyTotal;
    document.getElementById('stat-sell').textContent = sellTotal;
    var deltaEl = document.getElementById('stat-delta');
    deltaEl.textContent = (deltaTotal >= 0 ? '+' : '') + deltaTotal;
    deltaEl.style.color = deltaTotal >= 0 ? '#00d4aa' : '#ff4757';

    var ofStatLabel = document.getElementById('of-stat-label');
    var ofTimeRange = document.getElementById('of-time-range');
    if (ofStatLabel) {
        var visibleCount = list.querySelectorAll('.orderflow-item').length;
        ofStatLabel.textContent = '显示: ' + visibleCount + '条 (最多' + maxDisplay + '条)';
    }
    if (ofTimeRange && list.children.length > 0) {
        var firstTimeEl = list.children[0].querySelector('.time');
        var lastTimeEl = list.children[list.children.length - 1].querySelector('.time');
        var firstTime = firstTimeEl ? firstTimeEl.textContent : '--';
        var lastTime = lastTimeEl ? lastTimeEl.textContent : '--';
        ofTimeRange.textContent = firstTime + ' ~ ' + lastTime;
    }
}

// [NEW] 实时更新K线图表（包含新指标）
function updateKlineRealtime(klineUpdate) {
    for (var i = 0; i < windowMode; i++) {
        var inst = windowInstruments[i];
        if (!inst) continue;
        var chart = charts[i];
        if (!chart) continue;
        var period = windowPeriods[i] || '1m';
        var instKlines = klineUpdate[inst];
        if (!instKlines) continue;
        var bar = instKlines[period];
        if (!bar) continue;

        var option = chart.getOption();
        if (!option || !option.series || option.series.length === 0) continue;

        var dates = option.xAxis[0].data || [];
        var lastDate = dates[dates.length - 1];
        var candleData = option.series[0].data || [];
        var vwapData = option.series[1] ? option.series[1].data || [] : [];
        var buyVolData = option.series[2].data || [];
        var sellVolData = option.series[3].data || [];
        var volZData = option.series[4] ? option.series[4].data || [] : [];
        var cvdData = option.series[5] ? option.series[5].data || [] : [];
        var cvdSlopeData = option.series[6] ? option.series[6].data || [] : [];
        var noiData = option.series[7] ? option.series[7].data || [] : [];
        var noiZData = option.series[8] ? option.series[8].data || [] : [];
        var difData = option.series[9] ? option.series[9].data || [] : [];
        var deaData = option.series[10] ? option.series[10].data || [] : [];
        var macdData = option.series[11] ? option.series[11].data || [] : [];
        var spreadData = option.series[12] ? option.series[12].data || [] : [];

        if (!chart.__klines) chart.__klines = [];
        var klinesCache = chart.__klines;
        var liveMacd = bar.live_macd || null;

        if (lastDate === bar.time) {
            var lastIdx = candleData.length - 1;
            candleData[lastIdx] = [bar.open, bar.close, bar.low, bar.high];
            buyVolData[lastIdx] = { value: bar.buy_vol || 0, itemStyle: { color: '#00d4aa' } };
            sellVolData[lastIdx] = { value: bar.sell_vol || 0, itemStyle: { color: '#ff4757' } };

            if (klinesCache[lastIdx]) {
                klinesCache[lastIdx] = {
                    time: bar.time, open: bar.open, close: bar.close, low: bar.low, high: bar.high,
                    volume: bar.volume, buy_vol: bar.buy_vol || 0, sell_vol: bar.sell_vol || 0,
                    delta: bar.delta || 0, vwap: bar.vwap || 0, cvd: bar.cvd || 0, noi: bar.noi || 0
                };
            }

            if (liveMacd && difData.length > 0) {
                var macdLastIdx = difData.length - 1;
                difData[macdLastIdx] = liveMacd.dif;
                deaData[macdLastIdx] = liveMacd.dea;
                macdData[macdLastIdx] = {
                    value: liveMacd.macd,
                    itemStyle: { color: liveMacd.macd >= 0 ? '#00d4aa' : '#ff4757' }
                };
            }
        } else {
            dates.push(bar.time);
            candleData.push([bar.open, bar.close, bar.low, bar.high]);
            buyVolData.push({ value: bar.buy_vol || 0, itemStyle: { color: '#00d4aa' } });
            sellVolData.push({ value: bar.sell_vol || 0, itemStyle: { color: '#ff4757' } });
            klinesCache.push({
                time: bar.time, open: bar.open, close: bar.close, low: bar.low, high: bar.high,
                volume: bar.volume, buy_vol: bar.buy_vol || 0, sell_vol: bar.sell_vol || 0,
                delta: bar.delta || 0, vwap: bar.vwap || 0, cvd: bar.cvd || 0, noi: bar.noi || 0
            });

            // Push VWAP
            vwapData.push(bar.vwap !== undefined && bar.vwap !== null ? bar.vwap : null);

            // Push Vol Z-Score (carry forward last or null)
            var lastVolZ = volZData.length > 0 ? volZData[volZData.length - 1] : null;
            volZData.push(lastVolZ !== undefined && lastVolZ !== null ? lastVolZ : null);

            // Push CVD
            cvdData.push(bar.cvd !== undefined && bar.cvd !== null ? bar.cvd : null);

            // Push CVD Slope (carry forward last or null)
            var lastCvdSlope = cvdSlopeData.length > 0 ? cvdSlopeData[cvdSlopeData.length - 1] : null;
            cvdSlopeData.push(lastCvdSlope !== undefined && lastCvdSlope !== null ? lastCvdSlope : null);

            // Push NOI
            noiData.push(bar.noi !== undefined && bar.noi !== null ? bar.noi : null);

            // Push NOI Z-Score (carry forward last or null)
            var lastNoiZ = noiZData.length > 0 ? noiZData[noiZData.length - 1] : null;
            noiZData.push(lastNoiZ !== undefined && lastNoiZ !== null ? lastNoiZ : null);

            // Push Spread (from bar's ask/bid or last known)
            var barSpread = 0;
            if (bar.ask && bar.bid) {
                barSpread = Math.round((bar.ask - bar.bid) * 10000) / 10000;
            }
            if (barSpread === 0 && bar.spread) {
                barSpread = bar.spread;
            }
            var lastSpread = spreadData.length > 0 ? spreadData[spreadData.length - 1] : null;
            if (typeof lastSpread === 'object' && lastSpread !== null && lastSpread.value !== undefined) {
                lastSpread = lastSpread.value;
            }
            var pushSpread = barSpread || lastSpread || 0;
            spreadData.push({
                value: pushSpread,
                itemStyle: { color: pushSpread > (lastSpread || 0) * 2 ? '#ff4757' : '#666' }
            });

            if (liveMacd) {
                difData.push(liveMacd.dif);
                deaData.push(liveMacd.dea);
                macdData.push({
                    value: liveMacd.macd,
                    itemStyle: { color: liveMacd.macd >= 0 ? '#00d4aa' : '#ff4757' }
                });
            } else {
                var lastDif = difData.length > 0 ? difData[difData.length - 1] : null;
                var lastDea = deaData.length > 0 ? deaData[deaData.length - 1] : null;
                var lastMacd = macdData.length > 0 ? macdData[macdData.length - 1] : null;
                if (lastMacd && typeof lastMacd === 'object' && lastMacd.value !== undefined) lastMacd = lastMacd.value;
                difData.push(lastDif !== null && lastDif !== undefined ? lastDif : null);
                deaData.push(lastDea !== null && lastDea !== undefined ? lastDea : null);
                if (lastMacd !== null && lastMacd !== undefined) {
                    macdData.push({ value: lastMacd, itemStyle: { color: lastMacd >= 0 ? '#00d4aa' : '#ff4757' } });
                } else {
                    macdData.push(null);
                }
            }

            if (dates.length > 200) {
                dates.shift();
                candleData.shift();
                buyVolData.shift();
                sellVolData.shift();
                volZData.shift();
                cvdData.shift();
                cvdSlopeData.shift();
                noiData.shift();
                noiZData.shift();
                difData.shift();
                deaData.shift();
                macdData.shift();
                spreadData.shift();
                vwapData.shift();
                klinesCache.shift();
            }
        }

        chart.__klines = klinesCache;
        chart.setOption({
            xAxis: [
                { data: dates }, { data: dates }, { data: dates },
                { data: dates }, { data: dates }, { data: dates }
            ],
            grid: getChartGrids(i),
            series: [
                { data: candleData },
                { data: vwapData },
                { data: buyVolData },
                { data: sellVolData },
                { data: volZData },
                { data: cvdData },
                { data: cvdSlopeData },
                { data: noiData },
                { data: noiZData },
                { data: difData },
                { data: deaData },
                { data: macdData },
                { data: spreadData }
            ]
        });
    }
}


function switchSource() {
    var newSource = currentSource === 'mock' ? 'ctp' : 'mock';
    debugLog('切换数据源: ' + newSource, 'info');
    var btn = document.getElementById('btnSource');
    btn.disabled = true;
    btn.textContent = '切换中...';
    fetch(API_BASE + '/api/source?source=' + newSource, { method: 'POST' })
        .then(function(r) { 
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.json(); 
        })
        .then(function(data) {
            btn.disabled = false;
            if (data.status === 'ok') {
                currentSource = data.source;
                updateSourceButton();
                debugLog('数据源已切换: ' + data.source, 'success');
            } else if (data.status === 'error') {
                updateSourceButton();
                debugLog('切换失败: ' + (data.msg || '未知错误'), 'error');
                if (data.fallback) {
                    debugLog('已回退到: ' + data.fallback, 'warn');
                    currentSource = data.fallback;
                    updateSourceButton();
                }
            } else {
                updateSourceButton();
                debugLog('切换返回未知状态: ' + JSON.stringify(data), 'warn');
            }
        })
        .catch(function(err) {
            btn.disabled = false;
            updateSourceButton();
            debugLog('切换请求失败: ' + err.message, 'error');
            console.error('[Switch] 错误:', err);
        });
}

function updateSourceButton() {
    var btn = document.getElementById('btnSource');
    btn.textContent = currentSource === 'mock' ? 'Mock' : 'CTP';
    btn.className = 'btn-source ' + currentSource;
    btn.title = currentSource === 'mock' ? '点击切换到CTP' : '点击切换到Mock';
}

function connectWS() {
    if (isConnected || isConnecting) {
        debugLog("已经连接或连接中", "warn");
        return;
    }
    if (reconnectTimer) {
        clearTimeout(reconnectTimer);
        reconnectTimer = null;
    }
    if (heartbeatTimer) {
        clearInterval(heartbeatTimer);
        heartbeatTimer = null;
    }
    isConnecting = true;
    debugLog("连接: " + WS_URL, "info");
    document.getElementById('conn-status').textContent = "连接中...";
    document.getElementById('btnConnect').disabled = true;

    try {
        ws = new WebSocket(WS_URL);
        var lastPongTime = Date.now();

        ws.onopen = function() {
            console.log('[WS] onopen 触发，readyState:', ws.readyState);
            debugLog("WebSocket 连接成功!", "success");
            document.getElementById('conn-status').textContent = "已连接";
            document.getElementById('conn-status').classList.add('connected');
            isConnected = true;
            isConnecting = false;
            document.getElementById('btnConnect').textContent = "断开";
            document.getElementById('btnConnect').disabled = false;

            setTimeout(function() {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    console.log('[WS] 发送 get_config');
                    ws.send(JSON.stringify({action: 'get_config'}));
                }
            }, 100);

            heartbeatTimer = setInterval(function() {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    var elapsed = Date.now() - lastPongTime;
                    if (elapsed > 15000) {
                        console.warn('[WS] 15秒未收到数据，连接可能已死，主动断开重连');
                        ws.close();
                        return;
                    }
                    if (elapsed > 8000) {
                        console.log('[WS] 8秒无数据，发送ping探测');
                        ws.send(JSON.stringify({action: 'ping'}));
                    }
                }
            }, 3000);
        };

        ws.onmessage = function(event) {
            lastPongTime = Date.now();
            if (event.data.length < 200) {
                console.log('[WS] 收到消息:', event.data.substring(0, 100));
            } else {
                console.log('[WS] 收到消息，长度:', event.data.length, '前100字符:', event.data.substring(0, 100));
            }

            try {
                var data = JSON.parse(event.data);
                if (data.type === 'pong') {
                    console.log('[WS] 收到pong');
                    return;
                }
                if (data.type) {
                    console.log('[WS] 解析成功:', data.type, 'instruments:', Object.keys(data.instruments || {}).length, 'orderflow:', (data.selected_orderflow || []).length);
                }

                if (data.type === 'init' || data.type === 'update') {
                    if (data.window_config) {
                        windowMode = data.window_config.mode || windowMode;
                    }

                    if (data.instruments) {
                        for (var inst in data.instruments) {
                            var info = data.instruments[inst];
                            for (var i = 0; i < windowMode; i++) {
                                if (windowInstruments[i] === inst) {
                                    var priceEl = document.getElementById('price-' + i);
                                    if (priceEl && info.last_price !== undefined && info.last_price !== null) {
                                        var oldPrice = lastPrices[inst];
                                        var newPrice = parseFloat(info.last_price);
                                        if (isNaN(newPrice)) {
                                            console.warn('[UI] 价格无效:', inst, info.last_price);
                                            continue;
                                        }
                                        priceEl.textContent = newPrice.toFixed(2);
                                        priceEl.classList.remove('down', 'up', 'flash-up', 'flash-down');
                                        if (info.delta < 0) {
                                            priceEl.classList.add('down');
                                        } else if (info.delta > 0) {
                                            priceEl.classList.add('up');
                                        }
                                        if (oldPrice !== undefined && newPrice !== oldPrice) {
                                            if (newPrice > oldPrice) {
                                                priceEl.classList.add('flash-up');
                                            } else {
                                                priceEl.classList.add('flash-down');
                                            }
                                            setTimeout(function(el) {
                                                return function() {
                                                    el.classList.remove('flash-up', 'flash-down');
                                                };
                                            }(priceEl), 600);
                                        }
                                        lastPrices[inst] = newPrice;
                                    }
                                }
                            }
                        }
                    }

                    if (data.selected_orderflow) {
                        try {
                            updateOrderflow(data.selected_orderflow);
                        } catch(e) {
                            console.error('[UI] updateOrderflow 错误:', e);
                        }
                    }

                    if (data.kline_update) {
                        try {
                            updateKlineRealtime(data.kline_update);
                        } catch(e) {
                            console.error('[UI] updateKlineRealtime 错误:', e);
                        }
                    }
                    if (data.orderflow_stats) {
                        var ofStatLabel = document.getElementById('of-stat-label');
                        var ofTimeRange = document.getElementById('of-time-range');
                        if (ofStatLabel) {
                            ofStatLabel.textContent = '显示: ' + data.orderflow_stats.count + '条 (最多' + data.orderflow_stats.max_display + '条)';
                        }
                        if (ofTimeRange && data.orderflow_stats.time_range) {
                            ofTimeRange.textContent = data.orderflow_stats.time_range;
                        }
                    }
                    if (data.selected_name) {
                        document.getElementById('right-title').textContent = data.selected_name;
                        document.getElementById('right-code').textContent = data.selected_inst || '--';
                    }
                    if (data.data_source && data.data_source !== currentSource) {
                        currentSource = data.data_source;
                        updateSourceButton();
                        debugLog('数据源同步: ' + data.data_source, 'info');
                    }
                } else if (data.type === 'source_changed') {
                    currentSource = data.source;
                    updateSourceButton();
                    debugLog('数据源切换: ' + data.source + (data.reason ? ' (' + data.reason + ')' : ''), 'info');
                } else if (data.type === 'config') {
                    if (data.data_source && data.data_source !== currentSource) {
                        currentSource = data.data_source;
                        updateSourceButton();
                        debugLog('配置同步数据源: ' + data.data_source, 'info');
                    }
                } else if (data.type === 'ack') {
                    debugLog('ACK: ' + data.action, 'info');
                }
            } catch (e) {
                debugLog("解析错误: " + e.message, "error");
                console.error("[WS] 消息处理错误:", e, "原始数据:", event.data);
            }
        };

        ws.onerror = function(err) {
            console.error('[WS] onerror:', err);
            isConnecting = false;
            debugLog("WebSocket 错误 (readyState:" + (ws ? ws.readyState : 'null') + ")", "error");
            document.getElementById('conn-status').textContent = "错误";
            document.getElementById('btnConnect').disabled = false;
        };

        ws.onclose = function(event) {
            console.log('[WS] onclose:', 'code=' + event.code, 'reason=' + event.reason, 'wasClean=' + event.wasClean);
            debugLog("连接关闭 (code:" + event.code + ", wasClean:" + event.wasClean + ")", "warn");
            document.getElementById('conn-status').textContent = "断开";
            document.getElementById('conn-status').classList.remove('connected');
            isConnected = false;
            isConnecting = false;
            document.getElementById('btnConnect').textContent = "连接";
            document.getElementById('btnConnect').disabled = false;
            if (heartbeatTimer) {
                clearInterval(heartbeatTimer);
                heartbeatTimer = null;
            }
            if (!event.wasClean || event.code !== 1000) {
                reconnectTimer = setTimeout(function() {
                    debugLog("自动重连...", "info");
                    connectWS();
                }, 3000);
            }
        };
    } catch (e) {
        debugLog("创建连接失败: " + e.message, "error");
        document.getElementById('btnConnect').disabled = false;
    }
}

function disconnectWS() {
    if (heartbeatTimer) {
        clearInterval(heartbeatTimer);
        heartbeatTimer = null;
    }
    if (reconnectTimer) {
        clearTimeout(reconnectTimer);
        reconnectTimer = null;
    }
    if (ws) {
        try {
            ws.close(1000, "手动断开");
        } catch(e) {
            console.error('[WS] 关闭错误:', e);
        }
        ws = null;
    }
    isConnected = false;
    isConnecting = false;
    document.getElementById('conn-status').textContent = "断开";
    document.getElementById('conn-status').classList.remove('connected');
    document.getElementById('btnConnect').textContent = "连接";
    document.getElementById('btnConnect').disabled = false;
}

function toggleConnection() {
    if (isConnected) {
        disconnectWS();
    } else {
        connectWS();
    }
}

// ==================== 页面加载 ====================
document.addEventListener('DOMContentLoaded', function() {
    debugLog('页面加载，品种库: ' + ALL_INSTRUMENTS.length + '个', 'info');

    var btnConnect = document.getElementById('btnConnect');
    if (btnConnect) btnConnect.addEventListener('click', toggleConnection);

    var btnSource = document.getElementById('btnSource');
    if (btnSource) btnSource.addEventListener('click', switchSource);

    var ofList = document.getElementById('orderflow-list');
    if (ofList) {
        ofList.addEventListener('scroll', function() {
            var atBottom = ofList.scrollTop + ofList.clientHeight >= ofList.scrollHeight - 5;
            if (!atBottom) {
                ofUserScrolled = true;
                if (ofAutoReturnTimer) {
                    clearTimeout(ofAutoReturnTimer);
                    ofAutoReturnTimer = null;
                }
                ofAutoReturnTimer = setTimeout(function() {
                    ofUserScrolled = false;
                    ofList.scrollTop = ofList.scrollHeight;
                    debugLog('订单流自动回到底部', 'info');
                }, 15000);
            } else {
                ofUserScrolled = false;
                if (ofAutoReturnTimer) {
                    clearTimeout(ofAutoReturnTimer);
                    ofAutoReturnTimer = null;
                }
            }
        });
    }

    fetch(API_BASE + '/api/source')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            currentSource = data.source || 'mock';
            updateSourceButton();
            debugLog('数据源状态: ' + currentSource, 'info');
            initLayout();
            setTimeout(connectWS, 500);
        })
        .catch(function(err) {
            debugLog('获取数据源状态失败: ' + err.message, 'warn');
            updateSourceButton();
            initLayout();
            setTimeout(connectWS, 500);
        });
});
</script>
</body>
</html>
